<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phương án Tư vấn AI - AN TÍN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6 text-center">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
        <h1 class="text-2xl font-bold text-navy mb-4">Kết quả Phân tích AI</h1>
        <p class="mb-6">Dựa trên dữ liệu anh vừa cung cấp, đây là phương án tối ưu cho không gian của anh:</p>
        
    <div id="ai-result-content" class="...">
    <div id="combo-price-display" style="font-weight: bold; color: red;"></div>
    <ul id="ai-recommendations-list"></ul>
</div>

<a href="javascript:void(0)" 
   onclick="localStorage.setItem('da_dang_ky', 'true'); window.location.href='thankyou.html';" 
   class="block w-full bg-red-600 text-white font-bold py-4 px-4 rounded-xl text-center shadow-lg hover:bg-red-700 transition">
    ĐĂNG KÝ NHẬN PHƯƠNG ÁN KHẢO SÁT MIỄN PHÍ
    <br>
    <span style="font-size: 0.9em; opacity: 0.9;">(Chỉ còn 3 suất trong tuần này)</span>
</a>
    </div>
<script>
   document.addEventListener("DOMContentLoaded", async function() {
   // Lấy ưu tiên từ localStorage, nếu không có mới dùng URL, cuối cùng là mặc định
    const savedSpace = localStorage.getItem('loai_hinh');
    const urlParams = new URLSearchParams(window.location.search);
    const space = savedSpace || decodeURIComponent(urlParams.get('space')) || 'Nhà ở / Biệt thự';
    
    const resultBox = document.getElementById('ai-result-content');

    // 1. KỸ THUẬT SKELETON SCREEN (Giữ chân khách hàng)
    resultBox.style.transition = "opacity 0.5s ease";
    resultBox.style.opacity = "0.5";
    resultBox.innerHTML = `
        <div class="animate-pulse p-8">
            <h3 class="text-xl font-bold text-gray-400">An Tín đang thiết kế giải pháp riêng cho không gian "${space}" của anh...</h3>
        </div>`;

    // 2. LOGIC "HUMANIZE" & GOM HỒ SƠ KHÁCH HÀNG
    const strategies = {
        "Cửa hàng": {
            intro: `Dựa trên không gian "${space}" anh mô tả, An Tín đã thiết kế riêng bộ giải pháp giúp anh tối ưu hóa sự an tâm và lợi nhuận:`,
            points: [
                "Hệ thống an ninh 24/7: Đóng vai trò quản lý kỹ thuật, giúp anh phát hiện sự cố quầy thu ngân tức thì mà không cần trực tiếp có mặt.",
                "Hạ tầng mạng chịu tải cao: Đảm bảo doanh thu thông suốt, không gián đoạn kết nối khi khách hàng đông.",
                "Dịch vụ trọn gói: An Tín xử lý cả điện văn phòng & website, anh chỉ cần tập trung kinh doanh."
            ],
            price: "Từ 6.800.000đ - 18.000.000đ"
        },
        "default": {
            intro: `Chào anh, An Tín đã phân tích và đề xuất phương án tối ưu cho không gian "${space}" của anh:`,
            points: [
                "Giải pháp an ninh đa tầng giúp bảo vệ tài sản tuyệt đối 24/7.",
                "Hệ thống điện thông minh & Internet tốc độ cao nâng tầm trải nghiệm sử dụng.",
                "Bảo trì trọn gói định kỳ, hỗ trợ kỹ thuật từ 3-24h."
            ],
            price: "Liên hệ Hotline 0914 060 339 để được tư vấn miễn phí"
        }
    };

    // 3. TỐI ƯU HÓA & RENDERING
 // Thay thế đoạn render bên trong setTimeout thành đoạn này:
setTimeout(() => {
    const data = strategies[space] || strategies["default"];
    resultBox.style.opacity = "1";
    
    // Danh sách menu dịch vụ anh yêu cầu
    const serviceMenu = [
        "📹 Camera an ninh", "📡 Mạng Wi-Fi & CNTT", "🔐 Chống đột nhập", 
        "👆 Chấm công vân tay", "🚨 Báo cháy tự động", "🌐 Thiết kế Website",
        "☁️ Cloud Server & Hosting", "🏠 Smart Home", "⚡ Điện dân dụng/công nghiệp", 
        "🔧 Sửa chữa thiết bị điện", "♨️ Điện gia dụng", "🤖 Tự động hóa"
    ];

    resultBox.innerHTML = `
        <h3 class="text-xl font-bold text-blue-900 mb-4">${data.intro}</h3>
        
        <div class="bg-blue-50 p-4 rounded-lg mb-6 text-left border border-blue-200">
            <p class="font-bold text-blue-900 mb-3 text-sm">💡 Anh có đang quan tâm đến các giải pháp:</p>
            <div class="grid grid-cols-2 gap-2">
                ${serviceMenu.map(item => `
                    <button class="bg-white px-2 py-1.5 rounded border border-blue-300 text-xs text-left hover:bg-blue-100 transition">
                        ${item}
                    </button>
                `).join('')}
            </div>
        </div>

        <div class="bg-amber-50 p-4 rounded-lg mb-4 text-left border border-amber-200">
            <p class="font-bold text-amber-900 mb-1">💰 Ngân sách Combo dự kiến:</p>
            <p class="text-red-600 font-extrabold text-lg">${data.price}</p>
        </div>
        
        <p class="text-[10px] text-gray-400 italic mb-4">Đã có 500+ khách hàng tại TP.HCM tin tưởng giải pháp từ An Tín</p>
    `;

    // Cập nhật CTA
    const ctaButton = document.querySelector("a[href='thankyou.html']");
    if (ctaButton) {
        ctaButton.innerText = "Đăng ký nhận phương án khảo sát miễn phí (Chỉ còn 3 suất trong tuần này)";
    }
    }, 800);
});
</script>
</body>
</html>
