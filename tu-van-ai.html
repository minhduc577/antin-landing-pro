<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phương án Tư vấn AI - AN TÍN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader-rings { border-top-color: #3b82f6; border-right-color: #ef4444; border-bottom-color: #10b981; border-left-color: #f59e0b; }
        .whitespace-nowrap { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body class="bg-gray-50 p-4 text-center">
    <div class="max-w-lg mx-auto bg-white p-6 rounded-3xl shadow-xl border border-gray-100">
        <h1 class="text-2xl font-black text-gray-900 mb-5">Kết quả Phân tích AI</h1>
        <div id="ai-result-content"></div>
    </div>

<script>
    async function loadCategory(level, catKey = null, subKey = null) {
        const menuContainer = document.getElementById('dynamic-menu');
        menuContainer.innerHTML = `<div class="flex justify-center p-6"><div class="animate-spin loader-rings w-12 h-12 border-4 rounded-full"></div></div>`;
        
        try {
            const data = await (await fetch('data/data.json')).json();
            let html = '';

            if (level === 1) {
                html = `<div class="grid grid-cols-2 gap-3">`;
                const icons = { 'camera': '📷', 'mang': '📶', 'chong-trom': '🔒', 'cham-cong': '📱', 'bao-chay': '🔥', 'web': '🌐', 'cloud': '☁️', 'smart-home': '🏠', 'dien': '⚡', 'sua-chua': '🔧', 'gia-dung': '🔌', 'tu-dong-hoa': '🤖' };
                Object.keys(data).forEach(key => {
                    html += `<button onclick="loadCategory(2, '${key}')" class="bg-white border-2 border-blue-50 p-3 rounded-xl text-xs font-bold text-blue-900 hover:border-blue-400 whitespace-nowrap shadow-sm">${icons[key] || '🔘'} ${data[key].name}</button>`;
                });
                html += `</div>`;
            } else if (level === 2) {
                Object.keys(data[catKey].sub).forEach(key => {
                    html += `<button onclick="loadCategory(3, '${catKey}', '${key}')" class="w-full mb-2 bg-green-50 border border-green-100 p-4 rounded-xl text-sm font-bold text-green-900">${data[catKey].sub[key].name}</button>`;
                });
                html += `<button onclick="loadCategory(1)" class="text-gray-400 text-xs mt-2 underline">⬅️ Quay lại</button>`;
            } else if (level === 3) {
                if (catKey === 'cham-cong' && subKey === 'tenon') {
                    const tenon = await (await fetch('data/chamcongvantay/tenon_products_2026.json')).json();
                    tenon.products.forEach(p => {
                        html += `<div class="p-3 border-2 rounded-xl bg-white text-left mb-2 border-l-4 border-l-red-500">
                                    <div class="font-bold text-sm">${p.model}</div>
                                    <div class="text-red-600 font-black">${p.price_vnd.toLocaleString()}đ</div>
                                    <div class="text-[10px] text-gray-500">🗝️ ${p.unlock_methods.join(', ')}</div>
                                 </div>`;
                    });
                } else {
                    data[catKey].sub[subKey].products.forEach(p => {
                        html += `<div class="p-3 mb-1 bg-gray-100 rounded-lg text-xs font-bold text-gray-800">${p}</div>`;
                    });
                }
                html += `<button onclick="loadCategory(2, '${catKey}')" class="text-gray-400 text-xs mt-2 underline">⬅️ Quay lại</button>`;
            }
            menuContainer.innerHTML = html;
        } catch (e) { menuContainer.innerHTML = `<p class="text-red-500">Lỗi load dữ liệu!</p>`; }
    }

    document.addEventListener("DOMContentLoaded", async () => {
        const resultBox = document.getElementById('ai-result-content');
        resultBox.innerHTML = `<div class="py-10 flex flex-col items-center"><div class="animate-spin loader-rings w-16 h-16 border-4 rounded-full mb-4"></div><p class="font-bold text-blue-700">Đang quét không gian...</p></div>`;
        await new Promise(r => setTimeout(r, 2000));

        resultBox.innerHTML = `
            <p class="mb-4 text-sm font-medium text-gray-700">Dựa trên không gian, An Tín đề xuất giải pháp tối ưu:</p>
            <div class="bg-red-50 p-4 rounded-2xl border border-red-100 mb-6 text-center">
                <p class="text-red-600 font-black text-xs uppercase">🔥 Ưu đãi kết thúc sau:</p>
                <div id="countdown" class="text-3xl font-black font-mono text-red-600 my-1">09:04</div>
                <div class="text-2xl font-black text-red-600">10.600.000đ</div>
                <div class="text-xs font-bold text-gray-600 mt-1">Giá khoảng: 5.500.000đ - 15.000.000đ</div>
            </div>
            <div id="dynamic-menu" class="mb-6"></div>
            <a href="thankyou.html" class="block w-full bg-red-600 text-white font-black py-4 rounded-xl shadow-lg whitespace-nowrap text-sm">ĐĂNG KÝ NHẬN PHƯƠNG ÁN KHẢO SÁT MIỄN PHÍ</a>
            <div id="social-proof" class="mt-4 text-xs font-black text-red-600 italic h-6"></div>
        `;
        loadCategory(1);
    });
</script>
</body>
</html>
