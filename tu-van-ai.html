<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phương án Tư vấn AI - AN TÍN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6 text-center">
    <div class="max-w-lg mx-auto bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
        <h1 class="text-3xl font-black text-gray-900 mb-6">Kết quả Phân tích AI</h1>
        <div id="ai-result-content"></div>
    </div>

<script>
    function getPriceDisplay(space) {
        const data = { "Cửa hàng": { combo: "14.300.000đ", range: "6.800.000đ - 18.000.000đ" }, "Nhà ở": { combo: "10.600.000đ", range: "5.500.000đ - 15.000.000đ" } };
        return data[space] || { combo: "10.600.000đ", range: "5.500.000đ - 15.000.000đ" };
    }

    async function loadCategory(level, catKey = null, brandKey = null) {
        const menuContainer = document.getElementById('dynamic-menu');
        menuContainer.innerHTML = `<div class="flex justify-center p-6 text-blue-600 font-bold items-center"><div class="animate-spin text-2xl mr-3">🌀</div> Đang tối ưu hóa danh mục...</div>`;
        
        try {
            let html = '';
            const data = await (await fetch('data/data.json')).json();
            if (level === 1) {
                html = `<div class="grid grid-cols-2 gap-4">`;
                Object.keys(data).forEach(key => {
                    const icons = { 'camera': '📷', 'mang': '🌐', 'chong-trom': '🔒', 'cham-cong': '🖐️', 'bao-chay': '🔥', 'web': '🌐', 'cloud': '☁️', 'smart-home': '🏠', 'dien': '⚡', 'sua-chua': '🔧', 'gia-dung': '🔌', 'tu-dong-hoa': '🤖' };
                    html += `<button onclick="loadCategory(2, '${key}')" class="bg-white border-2 border-blue-100 p-5 rounded-2xl text-[15px] font-bold text-blue-900 hover:border-blue-400 hover:bg-blue-50 transition shadow-sm">${icons[key] || '🔘'} ${data[key].name}</button>`;
                });
                html += `</div>`;
            } else if (level === 2) {
                Object.keys(data[catKey].sub).forEach(key => {
                    html += `<button onclick="loadCategory(3, '${catKey}', '${key}')" class="w-full mb-3 bg-green-50 border-2 border-green-100 p-5 rounded-2xl text-md font-bold text-green-900 hover:bg-green-100 transition">${data[catKey].sub[key].name}</button>`;
                });
                html += `<button onclick="loadCategory(1)" class="text-gray-400 text-sm mt-3 font-semibold underline">⬅️ Quay lại danh mục chính</button>`;
            } else if (level === 3) {
                if (catKey === 'cham-cong' && brandKey === 'tenon') {
                    const tenon = await (await fetch('data/chamcongvantay/tenon_products_2026.json')).json();
                    tenon.products.forEach(p => {
                        html += `<div class="p-5 border-2 rounded-2xl bg-white shadow-sm text-left mb-4 border-l-8 border-l-red-500"><div class="flex justify-between"><span class="font-bold text-gray-900 text-lg">${p.model}</span>${p.badge ? `<span class="bg-red-500 text-white text-[10px] px-3 py-1 rounded-full font-bold uppercase tracking-wider">${p.badge}</span>` : ''}</div><p class="text-red-600 font-black text-xl my-2">${p.price_vnd.toLocaleString()}đ</p><p class="text-[14px] text-gray-700 font-medium">🗝️ ${p.unlock_methods.join(', ')}</p></div>`;
                    });
                } else {
                    data[catKey].sub[brandKey].products.forEach(p => {
                        html += `<div class="p-4 mb-2 bg-gray-100 rounded-xl text-md font-bold text-gray-800">${p}</div>`;
                    });
                }
                html += `<button onclick="loadCategory(2, '${catKey}')" class="text-gray-400 text-sm mt-3 font-semibold underline">⬅️ Quay lại</button>`;
            }
            menuContainer.innerHTML = html;
        } catch (e) { menuContainer.innerHTML = `<p class="text-red-500 p-4">Lỗi tải dữ liệu!</p>`; }
    }

    document.addEventListener("DOMContentLoaded", async () => {
        const space = localStorage.getItem('loai_hinh') || 'Nhà ở';
        const priceInfo = getPriceDisplay(space);
        const resultBox = document.getElementById('ai-result-content');
        
        resultBox.innerHTML = `<div class="py-16 flex flex-col items-center text-blue-700 font-bold"><div class="animate-spin text-5xl mb-6">🌀</div><p class="text-lg">Đang phân tích dữ liệu "${space}"...</p></div>`;
        await new Promise(r => setTimeout(r, 2000));

        resultBox.innerHTML = `
            <p class="mb-6 text-lg text-gray-800 leading-relaxed">Dựa trên không gian <b>"${space}"</b>, An Tín đã thiết kế giải pháp tối ưu:</p>
            <div class="bg-red-50 p-6 rounded-3xl border border-red-100 mb-8 text-center shadow-inner">
                <p class="text-red-600 font-black text-sm uppercase tracking-widest">🔥 Ưu đãi kết thúc sau:</p>
                <div id="countdown" class="text-5xl font-black font-mono text-red-600 my-3">09:04</div>
                <p class="text-gray-800 font-bold text-md">💰 Ngân sách Combo dự kiến:</p>
                <div class="text-4xl font-black text-red-600">${priceInfo.combo}</div>
                <p class="text-gray-800 font-bold text-sm mt-3 bg-white/50 py-1 px-3 rounded-full inline-block border border-red-200">Giá khoảng: ${priceInfo.range}</p>
            </div>
            <div id="dynamic-menu" class="mb-8"></div>
            <a href="thankyou.html" class="block w-full bg-red-600 text-white font-black text-lg py-5 rounded-2xl shadow-xl hover:bg-red-700 transition transform hover:scale-[1.02]">ĐĂNG KÝ NHẬN PHƯƠNG ÁN KHẢO SÁT MIỄN PHÍ</a>
            <div id="social-proof" class="mt-6 text-sm font-black text-red-600 italic h-8 transition-opacity duration-500"></div>
        `;
        loadCategory(1);

        let time = 544; setInterval(() => {
            let m = Math.floor(time / 60), s = time % 60;
            document.getElementById('countdown').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if(time>0) time--;
        }, 1000);

        const msgs = ["🔥 Chị Lan (Bình Dương) vừa nhận tư vấn 7 phút trước", "🔥 Anh Hùng (Tân Phú) vừa chốt giải pháp 12 phút trước", "🔥 Chị Mai (Q.1) vừa được khảo sát 3 phút trước"];
        setInterval(() => {
            const el = document.getElementById('social-proof');
            el.style.opacity = 0;
            setTimeout(() => { el.innerText = msgs[Math.floor(Math.random()*msgs.length)]; el.style.opacity = 1; }, 500);
        }, 5000);
    });
</script>
</body>
</html>
