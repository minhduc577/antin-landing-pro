<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phương án Tư vấn AI - AN TÍN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spin-rev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        .spin-slow { animation: spin 4s linear infinite; }
        .spin-rev { animation: spin-rev 3s linear infinite; }
        .spin-slow-rev { animation: spin 2s linear infinite reverse; }
    </style>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-md mx-auto bg-white p-6 rounded-3xl shadow-xl border border-gray-100">
        <h1 class="text-xl font-black text-center mb-6 text-gray-800">Kết quả Phân tích AI</h1>
        <div id="ai-result-content"></div>
    </div>

<script>
    function getPriceDisplay(space) {
        const data = { "Cửa hàng": { combo: "14.300.000đ", range: "6.800.000đ - 18.000.000đ" }, "Nhà ở": { combo: "10.600.000đ", range: "5.500.000đ - 15.000.000đ" } };
        return data[space] || { combo: "10.600.000đ", range: "5.500.000đ - 15.000.000đ" };
    }

    async function loadCategory(level, catKey = null, subKey = null) {
        const container = document.getElementById('dynamic-menu');
        // Hiệu ứng 3 vòng tròn AI quay ngược chiều nhau
        container.innerHTML = `<div class="flex justify-center p-8"><div class="relative w-12 h-12"><div class="absolute w-12 h-12 border-4 border-blue-400 border-t-transparent rounded-full spin-slow"></div><div class="absolute w-8 h-8 top-2 left-2 border-4 border-red-400 border-t-transparent rounded-full spin-rev"></div><div class="absolute w-4 h-4 top-4 left-4 border-2 border-yellow-400 border-t-transparent rounded-full spin-slow-rev"></div></div></div>`;
        
        try {
            const data = await (await fetch('data/data.json')).json();
            let html = '<div class="grid grid-cols-2 gap-2">';

            if (level === 1) {
                Object.keys(data).forEach(key => {
                    html += `<button onclick="loadCategory(2, '${key}')" class="bg-white border border-gray-100 p-2 rounded-xl text-[11px] font-bold text-gray-700 hover:border-blue-500 hover:text-blue-600 transition shadow-sm">${data[key].name}</button>`;
                });
            } else if (level === 2) {
                Object.keys(data[catKey].sub).forEach(key => {
                    html += `<button onclick="loadCategory(3, '${catKey}', '${key}')" class="col-span-2 bg-green-50 border border-green-100 p-3 rounded-xl text-sm font-bold text-green-900">${data[catKey].sub[key].name}</button>`;
                });
                html += `<button onclick="loadCategory(1)" class="col-span-2 text-gray-400 text-xs mt-2 underline">⬅️ Quay lại</button>`;
            } else if (level === 3) {
        const path = (catKey === 'cham-cong' && subKey === 'tenon') ? 'data/chamcongvantay/tenon_products_2026.json' : `data/${catKey}/${subKey}.json`;
        
        try {
            const response = await fetch(path);
            const data = await response.json();
            
            // Nếu là Tenon, hiển thị header chuyên nghiệp
            let html = (catKey === 'cham-cong' && subKey === 'tenon') ? `
                <div class="col-span-2 mb-4 p-4 bg-gray-900 text-white rounded-2xl shadow-lg">
                    <h3 class="font-black text-lg">${data.catalog_title}</h3>
                    <p class="text-[10px] text-gray-400 mt-1">${data.standards.join(' • ')}</p>
                </div>` : '';

            data.products.forEach(p => {
                const priceDisplay = Array.isArray(p.price_vnd) 
                    ? p.price_vnd.map(v => v.toLocaleString() + 'đ').join(' - ') 
                    : (p.price_vnd ? p.price_vnd.toLocaleString() + 'đ' : 'Liên hệ');

                html += `
                <div class="col-span-2 p-4 border border-gray-100 bg-white rounded-2xl mb-3 shadow-sm hover:border-red-500 transition-all">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="flex items-center gap-2">
                                <h4 class="font-black text-gray-900">${p.model}</h4>
                                ${p.badge ? `<span class="bg-red-500 text-white text-[9px] px-2 py-0.5 rounded-full font-bold uppercase">${p.badge}</span>` : ''}
                            </div>
                            <p class="text-[10px] text-gray-500 mt-1 uppercase italic">${p.unlock_methods ? p.unlock_methods.slice(0,3).join(', ') : ''}...</p>
                        </div>
                        <div class="text-right">
                            <div class="text-red-600 font-black text-sm">${priceDisplay}</div>
                        </div>
                    </div>
                </div>`;
            });
            html += `<button onclick="loadCategory(2, '${catKey}')" class="col-span-2 text-gray-400 text-xs mt-2 underline">⬅️ Quay lại danh mục</button>`;
            container.innerHTML = html;
            
        } catch (e) {
            console.error(e);
            container.innerHTML = `<p class="col-span-2 text-red-500 text-center text-xs">Đang tải bảng giá...</p>`;
        }
                             </div>`;
                });
                html += `<button onclick="loadCategory(2, '${catKey}')" class="col-span-2 text-gray-400 text-xs mt-2 underline">⬅️ Quay lại</button>`;
            }
            container.innerHTML = html + '</div>';
        } catch (e) { container.innerHTML = `<p class="text-red-500 text-center font-bold text-xs">Đang cập nhật dữ liệu...</p>`; }
    }

    document.addEventListener("DOMContentLoaded", () => {
        const space = localStorage.getItem('loai_hinh') || 'Nhà ở';
        const priceInfo = getPriceDisplay(space);
        
        document.getElementById('ai-result-content').innerHTML = `
            <div class="bg-red-50 p-5 rounded-3xl text-center mb-6 border border-red-100">
                <p class="text-red-600 font-bold text-[10px] uppercase mb-1">🔥 Ưu đãi kết thúc sau:</p>
                <div id="countdown" class="text-3xl font-black font-mono text-red-600">09:04</div>
                <div class="mt-3">
                    <p class="text-gray-700 font-bold text-xs">Ngân sách Combo dự kiến:</p>
                    <div class="text-5xl font-black text-red-600 my-2">${priceInfo.combo}</div>
                    <p class="text-gray-600 font-bold text-[11px] bg-white/60 py-1 px-4 rounded-full inline-block border border-red-100">
                        Giá khoảng: ${priceInfo.range}
                    </p>
                </div>
            </div>
            <div id="dynamic-menu"></div>
            <button class="w-full bg-red-600 text-white font-black py-4 rounded-xl mt-6 text-xs shadow-lg hover:bg-red-700 transition">ĐĂNG KÝ PHƯƠNG ÁN KHẢO SÁT</button>
            <div id="social-proof" class="mt-4 text-[10px] font-bold text-red-600 italic h-4 transition-opacity duration-500 text-center"></div>
        `;
        loadCategory(1);

        let time = 544; setInterval(() => {
            let m = Math.floor(time / 60), s = time % 60;
            const cd = document.getElementById('countdown');
            if(cd) cd.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if(time>0) time--;
        }, 1000);

        const msgs = [
            "🔥 Chị Lan (Bình Dương) vừa nhận tư vấn 7 phút trước", 
            "🔥 Anh Hùng (Tân Phú) vừa chốt giải pháp 12 phút trước", 
            "🔥 Dì Tám (Biên Hoà) vừa nhận tư vấn 7 phút trước", 
            "🔥 Anh Tí (Tây Ninh) vừa nhận tư vấn 8 phút trước", 
            "🔥 Anh Quyền (Long An) vừa nhận tư vấn 9 phút trước", 
            "🔥 Chị Mai (Q.1) vừa được khảo sát 3 phút trước"
        ];
        setInterval(() => {
            const el = document.getElementById('social-proof');
            if(el) {
                el.style.opacity = 0;
                setTimeout(() => { el.innerText = msgs[Math.floor(Math.random()*msgs.length)]; el.style.opacity = 1; }, 500);
            }
        }, 5000);
    });
</script>
</body>
</html>
