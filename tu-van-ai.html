<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phương án Tư vấn AI - AN TÍN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader-wrapper { display: flex; justify-content: center; align-items: center; height: 180px; position: relative; margin-top: 20px; }
        .circle { border: 3px solid transparent; border-radius: 50%; position: absolute; }
        .c1 { width: 80px; height: 80px; border-top-color: #ef4444; animation: spin 1s linear infinite; }
        .c2 { width: 65px; height: 65px; border-bottom-color: #3b82f6; animation: spin-rev 1.5s linear infinite; }
        .c3 { width: 50px; height: 50px; border-top-color: #10b981; animation: spin 2s linear infinite; }
        .c4 { width: 35px; height: 35px; border-bottom-color: #f59e0b; animation: spin-rev 2.5s linear infinite; }
        .c5 { width: 20px; height: 20px; border-top-color: #8b5cf6; animation: spin 3s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-rev { 100% { transform: rotate(-360deg); } }
    </style>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-md mx-auto bg-white p-6 rounded-3xl shadow-xl border border-gray-100">
        <h1 class="text-xl font-black text-center mb-6 text-gray-800">Kết quả Phân tích AI</h1>
        <div id="ai-result-content"></div>
    </div>

<script>
    function getPriceDisplay(space) {
        const data = { "Cửa hàng": { combo: "14.300.000đ", range: "6.800.000đ - 18.000.000đ" }, "Nhà ở": { combo: "10.600.000đ", range: "5.500.000đ - 15.000.000đ" } };
        return data[space] || { combo: "10.600.000đ", range: "5.500.000đ - 15.000.000đ" };
    }

    async function loadCategory(level, catKey = null, subKey = null) {
        const container = document.getElementById('dynamic-menu');
        if (!container) return;

        // Hiển thị hiệu ứng 5 vòng tròn trước khi tải
        container.innerHTML = `
            <div class="loader-wrapper">
                <div class="circle c1"></div><div class="circle c2"></div>
                <div class="circle c3"></div><div class="circle c4"></div>
                <div class="circle c5"></div>
            </div>
        `;

        try {
            await new Promise(r => setTimeout(r, 600)); // Hiệu ứng AI suy nghĩ
            const response = await fetch('data/data.json');
            const data = await response.json();
            let html = '<div class="grid grid-cols-2 gap-2 mt-4">';

            if (level === 1) {
                Object.keys(data).forEach(key => {
                    html += `<button onclick="loadCategory(2, '${key}')" class="bg-white border p-3 rounded-xl font-bold text-xs shadow-sm hover:border-red-500 transition">${data[key].name}</button>`;
                });
           } else if (level === 2) {
            const subData = data[catKey]?.sub || {};
            Object.keys(subData).forEach(key => {
                html += `<button onclick="loadCategory(3, '${catKey}', '${key}')" class="bg-green-50 p-4 rounded-xl font-bold text-sm col-span-2 shadow-sm">${subData[key].name}</button>`;
            });
            html += `<button onclick="loadCategory(1)" class="text-gray-400 text-xs mt-4 underline col-span-2">⬅️ Quay lại</button>`;
        } else if (level === 3) {
            // Hiệu ứng 5 vòng tròn lồng nhau
            container.innerHTML = `
                <div class="flex justify-center items-center h-48 relative">
                    <div class="absolute w-20 h-20 border-t-4 border-red-500 rounded-full animate-spin"></div>
                    <div class="absolute w-16 h-16 border-b-4 border-blue-500 rounded-full animate-spin" style="animation-direction: reverse; animation-duration: 1.5s;"></div>
                    <div class="absolute w-12 h-12 border-t-4 border-green-500 rounded-full animate-spin" style="animation-duration: 2s;"></div>
                    <div class="absolute w-8 h-8 border-b-4 border-yellow-500 rounded-full animate-spin" style="animation-direction: reverse; animation-duration: 2.5s;"></div>
                    <div class="absolute w-4 h-4 border-t-4 border-purple-500 rounded-full animate-spin" style="animation-duration: 3s;"></div>
                </div>`;
            
            await new Promise(r => setTimeout(r, 800)); // Giả lập AI đang tư vấn

            const path = (catKey === 'cham-cong' && subKey === 'tenon') ? 'data/ChamCongVanTay/tenon_products_2026.json' : `data/${catKey}/${subKey}.json`;
            const res = await fetch(path);
            const d = await res.json();
            
            html = '<div class="space-y-3 mt-4">';
            (d.products || []).forEach(p => {
                const label = typeof p === 'object' ? p.model : p;
                const price = (typeof p === 'object' && p.price_vnd) ? p.price_vnd.toLocaleString() + 'đ' : '';
                const img = (typeof p === 'object' && p.image) ? `<img src="${p.image}" class="w-16 h-16 object-cover rounded-lg mr-4">` : '';
                
                html += `<div class="p-3 bg-white border border-gray-100 rounded-xl shadow-sm flex items-center">
                            ${img}
                            <div>
                                <div class="font-bold text-xs text-gray-800">${label}</div>
                                <div class="text-red-600 font-bold text-xs">${price}</div>
                            </div>
                         </div>`;
            });
            html += `<button onclick="loadCategory(2, '${catKey}')" class="text-gray-400 text-xs mt-4 underline block w-full text-center">⬅️ Quay lại</button></div>`;
        }
        container.innerHTML = html;
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        const space = localStorage.getItem('loai_hinh') || 'Nhà ở';
        const priceInfo = getPriceDisplay(space);
        
        document.getElementById('ai-result-content').innerHTML = `
            <div class="bg-red-50 p-5 rounded-3xl text-center mb-6 border border-red-100">
                <p class="text-red-600 font-bold text-[10px] uppercase mb-1">🔥 Ưu đãi kết thúc sau:</p>
                <div id="countdown" class="text-3xl font-black font-mono text-red-600">09:04</div>
                <div class="mt-3">
                    <p class="text-gray-700 font-bold text-xs">Ngân sách Combo dự kiến:</p>
                    <div class="text-5xl font-black text-red-600 my-2">${priceInfo.combo}</div>
                    <p class="text-gray-600 font-bold text-[11px] bg-white/60 py-1 px-4 rounded-full inline-block border border-red-100">
                        Giá khoảng: ${priceInfo.range}
                    </p>
                </div>
            </div>
            <div id="dynamic-menu"></div>
            <button class="w-full bg-red-600 text-white font-black py-4 rounded-xl mt-6 text-xs shadow-lg hover:bg-red-700 transition">ĐĂNG KÝ PHƯƠNG ÁN KHẢO SÁT</button>
            <div id="social-proof" class="mt-4 text-[10px] font-bold text-red-600 italic h-4 transition-opacity duration-500 text-center"></div>
        `;
        loadCategory(1);

        // Countdown & Social Proof
        let time = 544; setInterval(() => {
            let m = Math.floor(time / 60), s = time % 60;
            const cd = document.getElementById('countdown');
            if(cd) cd.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if(time > 0) time--;
        }, 1000);

        const msgs = ["🔥 Chị Lan vừa nhận tư vấn 7 phút trước", "🔥 Anh Hùng vừa chốt giải pháp 12 phút trước", "🔥 Chị Mai vừa được khảo sát 3 phút trước"];
        setInterval(() => {
            const el = document.getElementById('social-proof');
            if(el) { el.style.opacity = 0; setTimeout(() => { el.innerText = msgs[Math.floor(Math.random()*msgs.length)]; el.style.opacity = 1; }, 500); }
        }, 5000);
    });
</script>
</body>
</html>
