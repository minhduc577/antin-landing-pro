<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phương án Tư vấn AI - AN TÍN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6 text-center">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
        <h1 class="text-2xl font-bold text-navy mb-4">Kết quả Phân tích AI</h1>
        <p class="mb-6">Dựa trên dữ liệu anh vừa cung cấp, đây là phương án tối ưu cho không gian của anh:</p>
        
    <div id="ai-result-content" class="...">
    <div id="combo-price-display" style="font-weight: bold; color: red;"></div>
    <ul id="ai-recommendations-list"></ul>
</div>

<a href="thankyou.html" class="block w-full bg-red-600 text-white font-bold py-4 rounded-xl text-center shadow-lg hover:bg-red-700 transition">
    NHẬN TÀI LIỆU CHI TIẾT & HOÀN TẤT
</a>
    </div>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const urlParams = new URLSearchParams(window.location.search);
    let space = decodeURIComponent(urlParams.get('space') || 'Nhà ở / Biệt thự');

    const resultBox = document.getElementById('ai-result-content');
    if (!resultBox) return;

    let titleText = `Giải pháp & Ước tính ngân sách cho: ${space}`;
    let aiRecommendations = [];
    let comboPrice = "";

    // =========================================================================
    // 1. KHỐI LOGIC: PHÂN TÍCH THEO HỆ SINH THÁI DỊCH VỤ TRỌN GÓI CỦA AN TÍN
    // =========================================================================
    if (space.includes("Nhà ở") || space.includes("Biệt thự")) {
        aiRecommendations = [
            "Hệ thống Camera AI giám sát vòng ngoài chống góc chết, tích hợp khóa cửa thông minh bảo mật vân tay đa tầng bảo vệ gia đình bạn.",
            "Giải pháp mạng Wi-Fi Mesh phủ xanh mọi ngóc ngách và lắp đặt hệ thống điện thông minh (Smart Home) điều khiển bằng giọng nói/smartphone.",
            "Kiểm tra an toàn hệ thống điện dân dụng, bảo trì định kỳ thiết bị điện gia đình (bếp điện, quạt, nồi điện) phòng chống cháy nổ."
        ];
        comboPrice = "Từ 4.500.000đ - 12.000.000đ (Trọn gói lắp đặt + Thiết bị cao cấp)";
    } 
    else if (space.includes("Cửa hàng") || space.includes("Shop") || space.includes("Chuỗi")) {
        aiRecommendations = [
            "Camera AI giám sát quầy thu ngân chống thất thoát, kết hợp hệ thống chấm công vân tay / kiểm soát ra vào nhân viên chính xác.",
            "Hạ tầng mạng Wi-Fi chuyên dụng chịu tải cao (chống rớt mạng khi khách đông) và thiết kế Website bán hàng chuẩn SEO chuyên nghiệp.",
            "Hệ thống Cloud Server / Hosting vận hành ổn định và giải pháp báo động chống trộm, báo cháy tự động sau giờ quản lý."
        ];
        comboPrice = "Từ 6.800.000đ - 18.000.000đ (Tối ưu hạ tầng mạng, web và an ninh)";
    } 
    else if (space.includes("Kho Bãi") || space.includes("Nhà Xưởng")) {
        aiRecommendations = [
            "Camera IP thân trụ hồng ngoại tầm xa trên 80m chuẩn IP67 chịu thời tiết, tích hợp hàng rào ảo cảnh báo đột nhập vùng biên.",
            "Hạ tầng CNTT chuyên nghiệp: Thiết kế phòng máy, tủ rack, hệ thống mạng Wi-Fi diện rộng cho nhà xưởng quản lý số liệu liên tục.",
            "Thi công, đấu nối tủ điện công nghiệp công suất lớn; bảo trì định kỳ hệ thống tự động hóa và thiết bị điện nhà xưởng."
        ];
        comboPrice = "Từ 15.000.000đ - 45.000.000đ (Thiết bị chuyên dụng tải cao)";
    } 
    else {
        // Trường hợp mặc định - Lời chào tổng lực của An Tín
        aiRecommendations = [
            "Tích hợp trọn gói giải pháp Công nghệ thông tin & An ninh: Camera giám sát, Wi-Fi tốc độ cao, Tổng đài nội bộ và Website doanh nghiệp.",
            "Giải pháp An toàn & Tiện ích: Hệ thống điện thông minh (Smart Home), báo cháy tự động và khóa cửa từ bảo mật cao nâng tầm công trình.",
            "Dịch vụ Kỹ thuật điện trọn gói: Thi công điện dân dụng/công nghiệp, sửa chữa thiết bị điện gia dụng nhanh từ 3 - 24 giờ tại TP.HCM."
        ];
        comboPrice = "Liên hệ Hotline: 0914 060 339 để nhận khảo sát & báo giá miễn phí";
    }

    // =========================================================================
    // 2. KHỐI HIỂN THỊ: ĐẶT HOÀN TOÀN BÊN NGOÀI KHỐI IF...ELSE
    // =========================================================================
    
    // Cập nhật giá combo
    const priceDisplay = document.getElementById("combo-price-display");
    if (priceDisplay) {
        priceDisplay.innerText = comboPrice;
    }

    // Cập nhật danh sách các giải pháp
    const listContainer = document.getElementById("ai-recommendations-list");
    if (listContainer) {
        listContainer.innerHTML = ""; // Xóa danh sách cũ
        aiRecommendations.forEach(item => {
            let li = document.createElement("li");
            li.innerText = item;
            listContainer.appendChild(li);
        });
    }
    resultBox.innerHTML = `
        <div class="w-full">
            <h3 class="text-xl font-bold text-blue-900 mb-4 text-center md:text-left">${titleText}</h3>
            <ul class="space-y-3 text-left list-none pl-0 mb-6">
                ${aiRecommendations.map(item => `
                    <li class="flex items-start">
                        <span class="text-red-600 mr-2 font-bold text-lg">•</span>
                        <span class="text-gray-700 font-medium text-base">${item}</span>
                    </li>
                `).join('')}
            </ul>
            <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 text-left">
                <p class="text-amber-900 font-bold text-lg mb-1">💰 Ngân sách Combo dự kiến (Gồm Camera, Đầu ghi, Lắp đặt, Bảo trì):</p>
                <p class="text-red-600 font-extrabold text-xl">${comboPrice}</p>
                <p class="text-gray-500 text-xs mt-2">* Chi phí thực tế phụ thuộc vào khảo sát tận nơi và số lượng mắt camera yêu cầu.</p>
            </div>
        </div>
    `;
});
</script>
</body>
</html>
