<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phương án Tư vấn AI - AN TÍN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-md mx-auto bg-white p-6 rounded-3xl shadow-xl border border-gray-100">
        <div class="bg-red-50 p-5 rounded-3xl text-center mb-6 border border-red-100">
            <p class="text-red-600 font-bold text-[10px] uppercase mb-1">🔥 Ưu đãi kết thúc sau:</p>
            <div id="countdown" class="text-3xl font-black font-mono text-red-600">09:00</div>
            <div class="mt-3">
                <p class="text-gray-700 font-bold text-xs">Ngân sách Combo dự kiến:</p>
                <div class="text-5xl font-black text-red-600 my-2">10.600.000đ</div>
            </div>
        </div>

        <div id="dynamic-menu"></div>
        
        <button class="w-full bg-red-600 text-white font-black py-4 rounded-xl mt-6 text-xs shadow-lg hover:bg-red-700 transition">ĐĂNG KÝ PHƯƠNG ÁN KHẢO SÁT</button>
    </div>

<script>
    async function loadCategory(level, catKey = null, subKey = null) {
        const container = document.getElementById('dynamic-menu');
        
        try {
            const data = await (await fetch('data/data.json')).json();
            let html = '<div class="grid grid-cols-2 gap-2">';

            if (level === 1) {
                Object.keys(data).forEach(key => {
                    html += `<button onclick="loadCategory(2, '${key}')" class="bg-white border border-gray-200 p-3 rounded-xl text-[11px] font-bold text-gray-700 hover:border-red-500 transition shadow-sm">${data[key].name}</button>`;
                });
            } else if (level === 2) {
                Object.keys(data[catKey].sub).forEach(key => {
                    html += `<button onclick="loadCategory(3, '${catKey}', '${key}')" class="col-span-2 bg-green-50 border border-green-100 p-3 rounded-xl text-sm font-bold text-green-900">${data[catKey].sub[key].name}</button>`;
                });
                html += `<button onclick="loadCategory(1)" class="col-span-2 text-gray-400 text-xs mt-2 underline">⬅️ Quay lại</button>`;
            } else if (level === 3) {
                // Đường dẫn file Tenon hoặc file thường
                const path = (catKey === 'cham-cong' && subKey === 'tenon') ? 'data/ChamCongVanTay/tenon_products_2026.json' : `data/${catKey}/${subKey}.json`;
                const d = await (await fetch(path)).json();
                
                // Nếu là Tenon, hiển thị tiêu đề
                if(d.catalog_title) {
                    html += `<div class="col-span-2 p-3 bg-gray-900 text-white rounded-xl mb-2 text-[10px]">${d.catalog_title}</div>`;
                }
                
                d.products.forEach(p => {
                    const price = Array.isArray(p.price_vnd) ? p.price_vnd[0].toLocaleString() + 'đ+' : (p.price_vnd ? p.price_vnd.toLocaleString() + 'đ' : 'Liên hệ');
                    html += `<div class="col-span-2 p-3 border-l-4 border-red-500 bg-white rounded-lg shadow-sm mb-2">
                                <div class="font-bold text-xs text-gray-900">${p.model}</div>
                                <div class="text-red-600 font-black text-xs">${price}</div>
                             </div>`;
                });
                html += `<button onclick="loadCategory(2, '${catKey}')" class="col-span-2 text-gray-400 text-xs mt-2 underline">⬅️ Quay lại</button>`;
            }
            container.innerHTML = html + '</div>';
        } catch (e) { container.innerHTML = `<p class="text-red-500 text-center font-bold text-xs">Vui lòng kiểm tra file data.json</p>`; }
    }

    // Tự động chạy khi mở trang
    document.addEventListener("DOMContentLoaded", () => {
        loadCategory(1);
        
        // Đồng hồ đếm ngược
        let time = 540; 
        setInterval(() => {
            let m = Math.floor(time / 60), s = time % 60;
            const cd = document.getElementById('countdown');
            if(cd) cd.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if(time > 0) time--;
        }, 1000);
    });
</script>
</body>
</html>
