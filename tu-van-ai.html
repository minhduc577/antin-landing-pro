<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phương án Tư vấn AI - AN TÍN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6 text-center">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
        <h1 class="text-2xl font-bold text-navy mb-4">Kết quả Phân tích AI</h1>
        <div id="ai-result-content"></div>
    </div>

<script>
    function calculatePrice(spaceType, deviceCount = 6) {
        const config = {
            "Cửa hàng": { base: 6800000, complexity: 1.2 },
            "Nhà ở": { base: 5500000, complexity: 1.0 },
            "Kho bãi": { base: 9000000, complexity: 1.5 }
        };
        const conf = config[spaceType] || { base: 5000000, complexity: 1.0 };
        let total = (conf.base + (deviceCount * 850000)) * conf.complexity;
        total = Math.round(total / 100000) * 100000;
        return total.toLocaleString('vi-VN') + "đ";
    }

    async function loadCategory(level, catKey = null, brandKey = null) {
        const menuContainer = document.getElementById('dynamic-menu');
        if (!menuContainer) return;
        menuContainer.innerHTML = `<p class="text-xs text-gray-500 italic text-center animate-pulse">Đang tải dữ liệu...</p>`;

        try {
            let html = '';
            if (level === 1) {
                const data = await (await fetch('data/data.json')).json();
                Object.keys(data).forEach(key => {
                    html += `<button onclick="loadCategory(2, '${key}')" class="bg-white px-3 py-2 rounded border border-blue-300 text-xs font-bold text-left hover:bg-blue-50">${data[key].name}</button>`;
                });
                menuContainer.innerHTML = `<div class="grid grid-cols-2 gap-2">${html}</div>`;
            } else if (level === 2) {
                const data = await (await fetch('data/data.json')).json();
                Object.keys(data[catKey].sub).forEach(key => {
                    html += `<button onclick="loadCategory(3, '${catKey}', '${key}')" class="bg-white px-3 py-2 rounded border border-green-300 text-xs font-bold text-left hover:bg-green-50">${data[catKey].sub[key].name}</button>`;
                });
                html += `<button onclick="loadCategory(1)" class="col-span-2 text-blue-600 font-bold text-xs mt-2 underline">⬅️ Quay lại</button>`;
                menuContainer.innerHTML = `<div class="grid grid-cols-2 gap-2">${html}</div>`;
            } else if (level === 3) {
                if (catKey === 'cham-cong' && brandKey === 'tenon') {
                    const tenonData = await (await fetch('data/chamcongvantay/tenon_products_2026.json')).json();
                    tenonData.products.forEach(p => {
                        html += `
                        <div class="p-3 border rounded-xl bg-white shadow-sm text-left mb-2">
                            <div class="flex justify-between items-center">
                                <span class="font-bold text-blue-900">${p.model}</span>
                                ${p.badge ? `<span class="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full uppercase">${p.badge}</span>` : ''}
                            </div>
                            <p class="text-red-600 font-bold text-sm my-1">${p.price_vnd.toLocaleString()}đ</p>
                            <p class="text-[11px] text-gray-600">🗝️: ${p.unlock_methods.join(', ')}</p>
                            <p class="text-[11px] text-gray-500 italic">Material: ${p.material}</p>
                        </div>`;
                    });
                } else {
                    const data = await (await fetch('data/data.json')).json();
                    data[catKey].sub[brandKey].products.forEach(p => {
                        html += `<div class="p-2 border rounded bg-white text-xs font-bold text-left mb-2">${p}</div>`;
                    });
                }
                html += `<button onclick="loadCategory(2, '${catKey}')" class="col-span-2 text-blue-600 font-bold text-xs mt-2 underline">⬅️ Quay lại</button>`;
                menuContainer.innerHTML = `<div class="flex flex-col gap-2">${html}</div>`;
            }
        } catch (e) { menuContainer.innerHTML = `<p class="text-red-500 text-xs">Lỗi tải dữ liệu!</p>`; }
    }

    document.addEventListener("DOMContentLoaded", async function() {
        const space = localStorage.getItem('loai_hinh') || 'Nhà ở';
        const resultBox = document.getElementById('ai-result-content');
        const stages = ["Đang quét kiến trúc...", "Phân tích nhu cầu AI...", "Tối ưu hóa bảng giá..."];
        
        for (let stage of stages) {
            resultBox.innerHTML = `<div class="p-10 text-center font-bold text-blue-600 animate-bounce">${stage}</div>`;
            await new Promise(r => setTimeout(r, 600));
        }

        resultBox.innerHTML = `
            <p class="mb-4 text-gray-700 font-medium">Dựa trên không gian <b>"${space}"</b> anh mô tả, An Tín đã thiết kế riêng bộ giải pháp giúp anh tối ưu sự an tâm và lợi nhuận:</p>
            <div class="bg-red-50 border border-red-200 p-4 rounded-xl mb-4 text-center">
                <p class="text-red-700 font-bold text-sm">🔥 Ưu đãi khảo sát miễn phí kết thúc sau:</p>
                <div id="countdown" class="text-3xl font-mono font-bold text-red-600">10:00</div>
                <p class="text-gray-600 font-bold mt-2">💰 Ngân sách Combo dự kiến:</p>
                <p class="text-red-600 font-bold text-3xl">${calculatePrice(space, 6)}</p>
                <p class="text-gray-400 text-xs italic mt-1">Dải giá: Từ 6.800.000đ - 18.000.000đ</p>
            </div>
            <div id="dynamic-menu" class="bg-blue-50 p-4 rounded-lg mb-6 border border-blue-200"></div>
            <a href="thankyou.html" class="block w-full bg-red-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-red-700 transition">ĐĂNG KÝ NHẬN PHƯƠNG ÁN KHẢO SÁT MIỄN PHÍ</a>
            <div id="social-proof" class="mt-4 text-xs text-gray-700 font-bold italic h-6 transition-opacity duration-500"></div>
        `;

        loadCategory(1);
        let time = 600;
        setInterval(() => {
            let m = Math.floor(time / 60), s = time % 60;
            const cd = document.getElementById('countdown');
            if(cd) cd.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            if (time > 0) time--;
        }, 1000);

       const msgs = [
            "🔥 Chị Lan (Bình Dương) vừa nhận tư vấn 7 phút trước", 
            "🔥 Anh Hùng (Tân Phú) vừa chốt giải pháp 12 phút trước", 
            "🔥 Dì Tám (Biên Hoà) vừa nhận tư vấn 7 phút trước", 
            "🔥 Anh Tí (Tây Ninh) vừa nhận tư vấn 8 phút trước", 
            "🔥 Anh Quyền (Long An) vừa nhận tư vấn 9 phút trước", 
            "🔥 Chị Mai (Q.1) vừa được khảo sát 3 phút trước"
        ];
        
        setInterval(() => {
             setInterval(() => {
            const el = document.getElementById('social-proof');
            el.style.opacity = 0;
            setTimeout(() => { el.innerText = msgs[Math.floor(Math.random()*msgs.length)]; el.style.opacity = 1; }, 500);
        }, 6000); 
});
</script>
</body>
</html>
