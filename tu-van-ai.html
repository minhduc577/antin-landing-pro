<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phương án Tư vấn AI - AN TÍN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spin-rev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        .spin-slow { animation: spin 4s linear infinite; }
        .spin-rev { animation: spin-rev 3s linear infinite; }
        .spin-slow-rev { animation: spin 2s linear infinite reverse; }
    </style>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-md mx-auto bg-white p-6 rounded-3xl shadow-xl border border-gray-100">
        <h1 class="text-xl font-black text-center mb-6 text-gray-800">Kết quả Phân tích AI</h1>
        <div id="ai-result-content"></div>
    </div>

<script>
    function getPriceDisplay(space) {
        const data = { "Cửa hàng": { combo: "14.300.000đ", range: "6.800.000đ - 18.000.000đ" }, "Nhà ở": { combo: "10.600.000đ", range: "5.500.000đ - 15.000.000đ" } };
        return data[space] || { combo: "10.600.000đ", range: "5.500.000đ - 15.000.000đ" };
    }

    async function loadCategory(level, catKey = null, subKey = null) {
        const container = document.getElementById('dynamic-menu');
        container.innerHTML = `<div class="flex justify-center p-8"><div class="relative w-12 h-12"><div class="absolute w-12 h-12 border-4 border-blue-400 border-t-transparent rounded-full spin-slow"></div><div class="absolute w-8 h-8 top-2 left-2 border-4 border-red-400 border-t-transparent rounded-full spin-rev"></div><div class="absolute w-4 h-4 top-4 left-4 border-2 border-yellow-400 border-t-transparent rounded-full spin-slow-rev"></div></div></div>`;
        
        try {
            const data = await (await fetch('data/data.json')).json();
            
            if (level === 1) {
                let html = '<div class="grid grid-cols-2 gap-2">';
                Object.keys(data).forEach(key => {
                    html += `<button onclick="loadCategory(2, '${key}')" class="bg-white border border-gray-100 p-2 rounded-xl text-[11px] font-bold text-gray-700 hover:border-blue-500 transition shadow-sm">${data[key].name}</button>`;
                });
                container.innerHTML = html + '</div>';
            } else if (level === 2) {
                let html = '<div class="grid grid-cols-2 gap-2">';
                Object.keys(data[catKey].sub).forEach(key => {
                    html += `<button onclick="loadCategory(3, '${catKey}', '${key}')" class="col-span-2 bg-green-50 border border-green-100 p-3 rounded-xl text-sm font-bold text-green-900">${data[catKey].sub[key].name}</button>`;
                });
                html += `<button onclick="loadCategory(1)" class="col-span-2 text-gray-400 text-xs mt-2 underline">⬅️ Quay lại</button></div>`;
                container.innerHTML = html;
            } else if (level === 3) {
                const path = (catKey === 'cham-cong' && subKey === 'tenon') ? 'data/chamcongvantay/tenon_products_2026.json' : `data/${catKey}/${subKey}.json`;
                const response = await fetch(path);
                const data = await response.json();
                
                let html = '<div class="grid grid-cols-2 gap-2">';
                if (catKey === 'cham-cong' && subKey === 'tenon') {
                    html = `<div class="col-span-2 mb-2 p-4 bg-gray-900 text-white rounded-2xl shadow-lg">
                                <h3 class="font-black text-sm">${data.catalog_title}</h3>
                                <p class="text-[9px] text-gray-400 mt-1">${data.standards.join(' • ')}</p>
                            </div>`;
                }

                data.products.forEach(p => {
                    const priceDisplay = Array.isArray(p.price_vnd) ? p.price_vnd.map(v => v.toLocaleString() + 'đ').join(' - ') : (p.price_vnd ? p.price_vnd.toLocaleString() + 'đ' : 'Liên hệ');
                    html += `
                    <div class="col-span-2 p-3 border border-gray-100 bg-white rounded-2xl mb-1 shadow-sm hover:border-red-500 transition-all">
                        <div class="flex justify-between items-center">
                            <div>
                                <h4 class="font-black text-sm text-gray-900">${p.model}</h4>
                                <p class="text-[9px] text-gray-500 uppercase">${p.unlock_methods ? p.unlock_methods.slice(0,2).join(', ') : ''}...</p>
                            </div>
                            <div class="text-red-600 font-black text-xs">${priceDisplay}</div>
                        </div>
                    </div>`;
                });
                html += `<button onclick="loadCategory(2, '${catKey}')" class="col-span-2 text-gray-400 text-xs mt-2 underline">⬅️ Quay lại</button></div>`;
                container.innerHTML = html;
            }
        } catch (e) { container.innerHTML = `<p class="text-red-500 text-center font-bold text-xs">Đang cập nhật dữ liệu...</p>`; }
    }

    document.addEventListener("DOMContentLoaded", () => {
        const space = localStorage.getItem('loai_hinh') || 'Nhà ở';
        const priceInfo = getPriceDisplay(space);
        document.getElementById('ai-result-content').innerHTML = `
            <div class="bg-red-50 p-5 rounded-3xl text-center mb-6 border border-red-100">
                <p class="text-red-600 font-bold text-[10px] uppercase mb-1">🔥 Ưu đãi kết thúc sau:</p>
                <div id="countdown" class="text-3xl font-black font-mono text-red-600">09:04</div>
                <div class="mt-3">
                    <p class="text-gray-700 font-bold text-xs">Ngân sách Combo dự kiến:</p>
                    <div class="text-5xl font-black text-red-600 my-2">${priceInfo.combo}</div>
                </div>
            </div>
            <div id="dynamic-menu"></div>
        `;
        loadCategory(1);
    });
</script>
</body>
</html>
