<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phương án Tư vấn AI - AN TÍN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6 text-center">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
        <h1 class="text-2xl font-bold text-navy mb-4">Kết quả Phân tích AI</h1>
        <div id="ai-result-content"></div>
    </div>

<script>
    function calculatePrice(spaceType, deviceCount = 6) {
        const config = {
            "Cửa hàng": { base: 6800000, complexity: 1.2 },
            "Nhà ở": { base: 5500000, complexity: 1.0 },
            "Kho bãi": { base: 9000000, complexity: 1.5 }
        };
        const conf = config[spaceType] || { base: 5000000, complexity: 1.0 };
        let total = (conf.base + (deviceCount * 850000)) * conf.complexity;
        return Math.round(total / 100000) * 100000;
    }

    async function loadCategory(level, catKey = null, brandKey = null) {
        const menuContainer = document.getElementById('dynamic-menu');
        menuContainer.innerHTML = `<p class="text-xs text-gray-500 animate-pulse italic">Đang truy xuất dữ liệu từ kho...</p>`;

        try {
            let html = '';
            if (level === 1) {
                const data = await (await fetch('data/data.json')).json();
                Object.keys(data).forEach(key => {
                    html += `<button onclick="loadCategory(2, '${key}')" class="bg-blue-50 border border-blue-200 px-4 py-3 rounded-lg text-sm font-bold text-blue-900 hover:bg-blue-100 transition">${data[key].name}</button>`;
                });
                menuContainer.innerHTML = `<div class="grid grid-cols-1 gap-3">${html}</div>`;
            } else if (level === 2) {
                const data = await (await fetch('data/data.json')).json();
                Object.keys(data[catKey].sub).forEach(key => {
                    html += `<button onclick="loadCategory(3, '${catKey}', '${key}')" class="bg-green-50 border border-green-200 px-4 py-3 rounded-lg text-sm font-bold text-green-900 hover:bg-green-100 transition">${data[catKey].sub[key].name}</button>`;
                });
                html += `<button onclick="loadCategory(1)" class="text-gray-500 font-bold text-xs mt-4 underline">⬅️ Quay lại</button>`;
                menuContainer.innerHTML = `<div class="grid grid-cols-1 gap-3">${html}</div>`;
            } else if (level === 3) {
                if (catKey === 'cham-cong' && brandKey === 'tenon') {
                    const tenon = await (await fetch('data/chamcongvantay/tenon_products_2026.json')).json();
                    tenon.products.forEach(p => {
                        html += `
                        <div class="p-4 border rounded-xl bg-white text-left shadow-sm mb-3">
                            <div class="flex justify-between items-center mb-2">
                                <span class="font-bold text-blue-800">${p.model}</span>
                                ${p.badge ? `<span class="bg-red-500 text-white text-[9px] px-2 py-0.5 rounded-full uppercase">${p.badge}</span>` : ''}
                            </div>
                            <p class="text-red-600 font-bold text-sm mb-1">${p.price_vnd.toLocaleString()}đ</p>
                            <p class="text-[10px] text-gray-600">🗝️ Mở: ${p.unlock_methods.join(', ')}</p>
                            <p class="text-[10px] text-gray-500 italic">Vật liệu: ${p.material}</p>
                        </div>`;
                    });
                } else {
                    const data = await (await fetch('data/data.json')).json();
                    data[catKey].sub[brandKey].products.forEach(p => {
                        html += `<div class="p-3 border rounded-lg bg-gray-50 text-xs font-semibold text-left mb-2">${p}</div>`;
                    });
                }
                html += `<button onclick="loadCategory(2, '${catKey}')" class="text-gray-500 font-bold text-xs mt-2 underline">⬅️ Quay lại</button>`;
                menuContainer.innerHTML = `<div>${html}</div>`;
            }
        } catch (e) { menuContainer.innerHTML = `<p class="text-red-500 text-xs">Lỗi truy xuất dữ liệu!</p>`; }
    }

    document.addEventListener("DOMContentLoaded", async () => {
        const space = localStorage.getItem('loai_hinh') || 'Nhà ở';
        const resultBox = document.getElementById('ai-result-content');
        
        // Hiệu ứng quét dữ liệu AI
        const stages = ["Đang quét kiến trúc...", "Phân tích nhu cầu AI...", "Tối ưu hóa bảng giá..."];
        for (let stage of stages) {
            resultBox.innerHTML = `<div class="p-10 text-center font-bold text-blue-600 animate-bounce">${stage}</div>`;
            await new Promise(r => setTimeout(r, 600));
        }

        resultBox.innerHTML = `
            <p class="mb-4 text-gray-700 font-medium">Dựa trên không gian <b>"${space}"</b>, An Tín đã thiết kế riêng bộ giải pháp:</p>
            <div class="bg-red-50 p-4 rounded-xl border border-red-200 mb-6 text-center">
                <p class="text-red-700 font-bold text-sm">🔥 Ưu đãi kết thúc sau:</p>
                <div id="countdown" class="text-3xl font-mono font-bold text-red-600">10:00</div>
                <p class="text-red-600 font-bold text-3xl mt-2">${calculatePrice(space).toLocaleString()}đ</p>
            </div>
            <div id="dynamic-menu" class="mb-6"></div>
            <a href="thankyou.html" class="block w-full bg-red-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-red-700">ĐĂNG KÝ NHẬN TƯ VẤN</a>
            <div id="social-proof" class="mt-4 text-xs text-gray-700 font-bold italic h-6 transition-opacity duration-500"></div>
        `;

        loadCategory(1);
        
        // Đếm ngược
        let time = 600; setInterval(() => {
            let m = Math.floor(time / 60), s = time % 60;
            document.getElementById('countdown').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if(time>0) time--;
        }, 1000);

        // Social Proof
        const msgs = ["💡 Chị Lan vừa nhận tư vấn 7 phút trước", "💡 Anh Hùng vừa chốt giải pháp 12 phút trước", "💡 Chị Mai vừa được khảo sát 3 phút trước"];
        setInterval(() => {
            const el = document.getElementById('social-proof');
            el.style.opacity = 0;
            setTimeout(() => { el.innerText = msgs[Math.floor(Math.random()*msgs.length)]; el.style.opacity = 1; }, 500);
        }, 6000);
    });
</script>
</body>
</html>
