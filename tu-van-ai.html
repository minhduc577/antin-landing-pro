<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phương án Tư vấn AI - AN TÍN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6 text-center">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
        <h1 class="text-2xl font-bold text-navy mb-4">Kết quả Phân tích AI</h1>
        <p class="mb-6">Dựa trên dữ liệu anh vừa cung cấp, đây là phương án tối ưu cho không gian của anh:</p>
        
       <div id="ai-result-content" class="p-6 bg-blue-50 rounded-xl border border-blue-200 mb-6 text-left">
    </div>

<a href="thankyou.html" class="block w-full bg-red-600 text-white font-bold py-4 rounded-xl text-center shadow-lg hover:bg-red-700 transition">
    NHẬN TÀI LIỆU CHI TIẾT & HOÀN TẤT
</a>
    </div>

   <script>
document.addEventListener("DOMContentLoaded", function() {
    // 1. Đọc loại không gian từ URL khách vừa chọn
    const urlParams = new URLSearchParams(window.location.search);
    let space = urlParams.get('space') || 'Nhà ở / Biệt thự';
    
    // Tìm các phần tử giao diện để thay đổi nội dung (Cấu hình theo class/id thực tế của anh)
    const titleElement = document.querySelector('.card h3') || document.body; 
    const listContainer = document.querySelector('ul'); 

    let aiRecommendations = [];

    // 2. Bộ não phân tích logic chuẩn mảng kinh doanh AN TÍN TECHNOLOGY
    if (space.includes("Nhà ở") || space.includes("Biệt thự")) {
        aiRecommendations = [
            "Hệ thống Camera AI giám sát vòng ngoài chống góc chết, tích hợp hồng ngoại ban đêm siêu sắc nét.",
            "Khóa cửa vân tay thông minh bảo mật đa tầng, tự động gửi cảnh báo cạy phá về điện thoại real-time.",
            "Giải pháp mạng Wifi Mesh phủ xanh mọi tầng lầu, đảm bảo kết nối mượt mà cho các thiết bị thông minh."
        ];
    } else if (space.includes("Cửa Hàng") || space.includes("Shop")) {
        aiRecommendations = [
            "Camera AI độ phân giải cao giám sát quầy thu ngân chặt chẽ và hỗ trợ đếm lượt khách ra vào.",
            "Mạng Wifi chuyên dụng chịu tải cao cho khách hàng, tách biệt phân quyền bảo mật dữ liệu nội bộ.",
            "Hệ thống báo động chống trộm, cảm biến hồng ngoại tự động kích hoạt loa hú khi hết giờ làm việc."
        ];
    } else if (space.includes("Kho Bãi") || space.includes("Nhà Xưởng")) {
        aiRecommendations = [
            "Camera IP thân trụ chuẩn chống nước IP67, tầm xa hồng ngoại 50m-80m chuyên dụng cho không gian lớn.",
            "Hạ tầng mạng CNTT băng thông lớn, kết nối hệ thống tủ rack và máy chủ vận hành ổn định.",
            "Hàng rào điện tử và cảm biến báo động đột nhập vùng biên, bảo vệ tài sản doanh nghiệp 24/7."
        ];
    } else {
        // Phương án tổng hợp mặc định của AN TÍN
        aiRecommendations = [
            "Hệ thống Camera giám sát và thiết bị an ninh tích hợp AI tiên tiến nhất.",
            "Hạ tầng mạng Wifi công nghệ mới và hệ thống CNTT tối ưu hóa hiệu năng.",
            "Giải pháp khóa cửa vân tay và báo động chống trộm toàn diện từ chuyên gia AN TÍN."
        ];
    }

    // 3. Render dữ liệu ra màn hình một cách mượt mà
    if (listContainer) {
        listContainer.innerHTML = aiRecommendations.map(item => `
            <li class="flex items-start space-x-2 text-gray-700">
                <span class="text-red-600 mr-2">•</span>
                <span>${item}</span>
            </li>
        `).join('');
    }
});
</script>
</body>
</html>
