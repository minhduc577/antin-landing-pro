<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phương án Tư vấn AI - AN TÍN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6 text-center">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
        <h1 class="text-2xl font-bold text-navy mb-4">Kết quả Phân tích AI</h1>
        <p class="mb-6">Dựa trên dữ liệu anh vừa cung cấp, đây là phương án tối ưu cho không gian của anh:</p>
        
        <div id="ai-result-content"></div>
    </div>

<script>
    function calculatePrice(spaceType, deviceCount = 4) {
        const config = {
            "Cửa hàng": { base: 6800000, complexity: 1.2 },
            "Nhà ở": { base: 5500000, complexity: 1.0 },
            "Kho bãi": { base: 9000000, complexity: 1.5 }
        };
        const conf = config[spaceType] || { base: 5000000, complexity: 1.0 };
        let total = (conf.base + (deviceCount * 850000)) * conf.complexity;
        total = Math.round(total / 100000) * 100000;
        return total.toLocaleString('vi-VN') + "đ";
    }

    document.addEventListener("DOMContentLoaded", async function() {
        const savedSpace = localStorage.getItem('loai_hinh');
        const urlParams = new URLSearchParams(window.location.search);
        const space = savedSpace || decodeURIComponent(urlParams.get('space')) || 'Nhà ở';
        const resultBox = document.getElementById('ai-result-content');

        const stages = ["Đang quét dữ liệu không gian...", "Đang tính toán định mức vật tư...", "Đang tối ưu hóa vị trí...", "Đang hoàn tất phân tích AI..."];
        for (let stage of stages) {
            resultBox.innerHTML = `<div class="p-10 animate-pulse text-lg font-semibold text-gray-700">${stage}</div>`;
            await new Promise(resolve => setTimeout(resolve, 800));
        }

        const strategies = {
            "Cửa hàng": { intro: `Dựa trên không gian "Cửa hàng" anh mô tả, An Tín đã thiết kế riêng bộ giải pháp giúp anh tối ưu hóa sự an tâm và lợi nhuận:` },
            "Kho bãi": { intro: `An Tín đã phân tích và đề xuất phương án tối ưu cho không gian "Kho bãi" của anh:` }
        };
        const data = strategies[space] || { intro: `An Tín đã phân tích và đề xuất phương án tối ưu cho không gian "${space}" của anh:` };
        const serviceMenu = ["📷 Camera an ninh", "🌐 Mạng Wi-Fi & CNTT", "🔒 Chống đột nhập", "🫵 Chấm công vân tay", "🔥 Báo cháy tự động", "🌐 Thiết kế Website", "☁️ Cloud Server & Hosting", "🏠 Smart Home", "⚡ Điện dân dụng/công nghiệp", "🔧 Sửa chữa thiết bị điện", "🍲 Điện gia dụng", "🤖 Tự động hóa"];
        const finalPrice = calculatePrice(space, 6);

        resultBox.innerHTML = `
            <h3 class="text-xl font-bold text-blue-900 mb-4">${data.intro}</h3>
            <div class="bg-red-50 border border-red-200 p-3 rounded-lg mb-4 text-center">
                <p class="text-red-700 font-bold text-sm">🔥 Ưu đãi khảo sát miễn phí kết thúc sau:</p>
                <div id="countdown" class="text-2xl font-mono font-bold text-red-600 mt-1">10:00</div>
            </div>
            <div class="bg-blue-50 p-4 rounded-lg mb-6 border border-blue-200">
                <div class="grid grid-cols-2 gap-2">${serviceMenu.map(item => `<button class="bg-white px-2 py-1.5 rounded border border-blue-300 text-xs text-left">${item}</button>`).join('')}</div>
            </div>
            <a href="thankyou.html" id="btn-register-lead" class="block w-full bg-red-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-red-700 transition">
                ĐĂNG KÝ NHẬN PHƯƠNG ÁN KHẢO SÁT MIỄN PHÍ
            </a>
            <div id="social-proof" class="mt-4 text-[11px] text-gray-500 italic h-5 overflow-hidden transition-all">
                Đã có 500+ khách hàng tại TP.HCM tin tưởng giải pháp từ An Tín
            </div>
        `;

        // Logic Đếm ngược
        let time = 600; 
        setInterval(() => {
            let m = Math.floor(time / 60);
            let s = time % 60;
            document.getElementById('countdown').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            if (time > 0) time--;
        }, 1000);

        // Logic Social Proof
        const names = ["Anh Hùng (Quận 7)", "Chị Lan (Bình Dương)", "Anh Tuấn (Thủ Đức)", "Chị Mai (Quận 12)", "Anh Bình (Biên Hòa)"];
        setInterval(() => {
            const el = document.getElementById('social-proof');
            const name = names[Math.floor(Math.random() * names.length)];
            el.style.opacity = 0;
            setTimeout(() => {
                el.innerText = `💡 ${name} vừa nhận tư vấn cách đây ${Math.floor(Math.random() * 10) + 1} phút`;
                el.style.opacity = 1;
            }, 500);
        }, 5000);

        // --- CODE THEO DÕI ĐƯỢC CHÈN VÀO ---
        document.getElementById('btn-register-lead').addEventListener('click', function() {
            // 1. Pixel/GTM
            if (typeof fbq !== 'undefined') fbq('track', 'Lead', { content_name: 'Lead_Qualified' });
            window.dataLayer = window.dataLayer || [];
            window.dataLayer.push({'event': 'Lead_Qualified'});
            
            // 2. Webhook (Thay URL của anh vào đây)
            fetch("URL_MAKE_COM_HOOK_CỦA_ANH", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ space: '${space}', timestamp: new Date() })
            });
        });
    });
</script>
</body>
</html>
