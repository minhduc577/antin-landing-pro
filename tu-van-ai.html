<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phương án Tư vấn AI - AN TÍN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6 text-center">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
        <h1 class="text-2xl font-bold text-navy mb-4">Kết quả Phân tích AI</h1>
        <p class="mb-6">Dựa trên dữ liệu anh vừa cung cấp, đây là phương án tối ưu cho không gian của anh:</p>
        
    <div id="ai-result-content" class="...">
    <div id="combo-price-display" style="font-weight: bold; color: red;"></div>
    <ul id="ai-recommendations-list"></ul>
</div>

<a href="thankyou.html" class="block w-full bg-red-600 text-white font-bold py-4 rounded-xl text-center shadow-lg hover:bg-red-700 transition">
    NHẬN TÀI LIỆU CHI TIẾT & HOÀN TẤT
</a>
    </div>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const urlParams = new URLSearchParams(window.location.search);
    const space = decodeURIComponent(urlParams.get('space') || 'Nhà ở / Biệt thự');
    const resultBox = document.getElementById('ai-result-content');

    if (!resultBox) return;

    // 1. HIỆU ỨNG SKELETON SCREEN (Giữ chân khách hàng)
    resultBox.style.transition = "opacity 0.3s ease";
    resultBox.style.opacity = "0.5";
    resultBox.innerHTML = `<h3 class="text-xl font-semibold text-gray-600">Đang phân tích giải pháp tối ưu cho không gian "${space}" của anh...</h3>`;

    // 2. DỮ LIỆU ĐƯỢC "HUMANIZE"
    const recommendations = {
        "Cửa hàng": {
            intro: `Dựa trên không gian "${space}" anh mô tả, An Tín đã thiết kế riêng bộ giải pháp giúp anh tối ưu hóa sự an tâm và lợi nhuận:`,
            points: ["Hệ thống an ninh 24/7: Giúp anh phát hiện sự cố quầy thu ngân tức thì mà không cần ngồi trực.", "Hạ tầng mạng chịu tải cao: Đảm bảo doanh thu thông suốt khi khách hàng đông.", "Dịch vụ trọn gói: An Tín xử lý cả điện văn phòng & website, anh chỉ cần tập trung kinh doanh."],
            price: "Từ 6.800.000đ - 18.000.000đ (Tối ưu hạ tầng mạng, web & an ninh)"
        },
        "default": {
            intro: `Chào anh, An Tín đã phân tích và đề xuất phương án tối ưu cho không gian "${space}" của anh:`,
            points: ["Giải pháp an ninh đa tầng giúp bảo vệ tài sản tuyệt đối 24/7.", "Hệ thống điện thông minh & Internet tốc độ cao nâng tầm trải nghiệm sử dụng.", "Bảo trì trọn gói định kỳ, hỗ trợ kỹ thuật từ 3-24h."],
            price: "Liên hệ Hotline 0914 060 339 để nhận báo giá may đo chính xác."
        }
    };

    // 3. XỬ LÝ LỖI & RENDER KẾT QUẢ SAU 800MS
    setTimeout(() => {
        const data = recommendations[space] || recommendations["default"];
        resultBox.style.opacity = "1";
        
        resultBox.innerHTML = `
            <h3 class="text-xl font-bold text-blue-900 mb-4">${data.intro}</h3>
            <ul class="space-y-3 text-left mb-6">
                ${data.points.map(p => `<li class="flex items-start"><span class="text-red-600 mr-2 font-bold">•</span>${p}</li>`).join('')}
            </ul>
            <div class="bg-amber-50 p-4 rounded-lg mb-6 text-left border border-amber-200">
                <p class="font-bold text-red-600 text-lg">${data.price}</p>
            </div>
            <p class="text-sm text-gray-500 italic mb-6">✓ Đã có hơn 500+ cửa hàng tại TP.HCM tin tưởng giải pháp từ An Tín</p>
        `;

        // 4. KÊU GỌI HÀNH ĐỘNG (CTA) KHAN HIẾM
        const ctaButton = document.querySelector("a[href='thankyou.html']");
        if (ctaButton) {
            ctaButton.innerText = "Đăng ký nhận phương án khảo sát miễn phí (Chỉ còn 3 suất trong tuần này)";
        }
    }, 800);
});
    resultBox.innerHTML = `
        <div class="w-full">
            <h3 class="text-xl font-bold text-blue-900 mb-4 text-center md:text-left">${titleText}</h3>
            <ul class="space-y-3 text-left list-none pl-0 mb-6">
                ${aiRecommendations.map(item => `
                    <li class="flex items-start">
                        <span class="text-red-600 mr-2 font-bold text-lg">•</span>
                        <span class="text-gray-700 font-medium text-base">${item}</span>
                    </li>
                `).join('')}
            </ul>
            <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 text-left">
                <p class="text-amber-900 font-bold text-lg mb-1">💰 Ngân sách Combo dự kiến (Gồm Camera, Đầu ghi, Lắp đặt, Bảo trì):</p>
                <p class="text-red-600 font-extrabold text-xl">${comboPrice}</p>
                <p class="text-gray-500 text-xs mt-2">* Chi phí thực tế phụ thuộc vào khảo sát tận nơi và số lượng mắt camera yêu cầu.</p>
            </div>
        </div>
    `;
});
</script>
</body>
</html>
