<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phương án Tư vấn AI - AN TÍN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6 text-center">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
        <h1 class="text-2xl font-bold text-navy mb-4">Kết quả Phân tích AI</h1>
        <p class="mb-6">Dựa trên dữ liệu anh vừa cung cấp, đây là phương án tối ưu cho không gian của anh:</p>
        
        <div id="ai-result-content"></div>
    </div>

<script>
    // Hàm tính toán giá động
    function calculatePrice(spaceType, deviceCount = 4) {
        const config = {
            "Cửa hàng": { base: 6800000, complexity: 1.2 },
            "Nhà ở": { base: 5500000, complexity: 1.0 },
            "Kho bãi": { base: 9000000, complexity: 1.5 }
        };
        const conf = config[spaceType] || { base: 5000000, complexity: 1.0 };
        let total = (conf.base + (deviceCount * 850000)) * conf.complexity;
        total = Math.round(total / 100000) * 100000;
        return total.toLocaleString('vi-VN') + "đ";
    }

    document.addEventListener("DOMContentLoaded", async function() {
        const savedSpace = localStorage.getItem('loai_hinh');
        const urlParams = new URLSearchParams(window.location.search);
        const space = savedSpace || decodeURIComponent(urlParams.get('space')) || 'Nhà ở';
        const resultBox = document.getElementById('ai-result-content');

        // Hiệu ứng Loading
        const stages = ["Đang quét dữ liệu không gian...", "Đang tính toán định mức vật tư...", "Đang tối ưu hóa vị trí...", "Đang hoàn tất phân tích AI..."];
        for (let stage of stages) {
            resultBox.innerHTML = `<div class="p-10 animate-pulse text-lg font-semibold text-gray-700">${stage}</div>`;
            await new Promise(resolve => setTimeout(resolve, 800));
        }

        // Logic dữ liệu
        const strategies = {
            "Cửa hàng": { intro: `Dựa trên không gian "Cửa hàng" anh mô tả, An Tín đã thiết kế riêng bộ giải pháp giúp anh tối ưu hóa sự an tâm và lợi nhuận:` },
            "Kho bãi": { intro: `An Tín đã phân tích và đề xuất phương án tối ưu cho không gian "Kho bãi" của anh:` }
        };
        
        const data = strategies[space] || { intro: `An Tín đã phân tích và đề xuất phương án tối ưu cho không gian "${space}" của anh:` };
        const serviceMenu = ["📷 Camera an ninh", "🌐 Mạng Wi-Fi & CNTT", "🔒 Chống đột nhập", "🫵 Chấm công vân tay", "🔥 Báo cháy tự động", "🌐 Thiết kế Website", "☁️ Cloud Server & Hosting", "🏠 Smart Home", "⚡ Điện dân dụng/công nghiệp", "🔧 Sửa chữa thiết bị điện", "🍲 Điện gia dụng", "🤖 Tự động hóa"];
        const finalPrice = calculatePrice(space, 6);

        // Render kết quả (Khớp với khung đỏ của anh)
        resultBox.innerHTML = `
            <div class="mb-6 font-bold text-blue-900">${data.intro}</div>
            <div class="bg-blue-50 p-4 rounded-lg mb-6 text-left border border-blue-200">
                <p class="text-sm font-bold text-blue-900 mb-3">💡 Anh có đang quan tâm đến các giải pháp:</p>
                <div class="grid grid-cols-2 gap-2">
                    ${serviceMenu.map(item => `<button class="bg-white px-2 py-1.5 rounded border border-blue-300 text-xs text-left hover:bg-blue-100 transition">${item}</button>`).join('')}
                </div>
            </div>
            <div class="bg-amber-50 p-4 rounded-lg mb-6 text-left border border-amber-200">
                <p class="font-bold text-amber-900">💰 Ngân sách Combo dự kiến:</p>
                <p class="text-red-600 font-bold text-2xl">${finalPrice}</p>
            </div>
            <a href="thankyou.html" class="block w-full bg-red-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-red-700 transition">
                ĐĂNG KÝ NHẬN PHƯƠNG ÁN KHẢO SÁT MIỄN PHÍ
                <br><span class="text-sm opacity-90 font-normal">(Chỉ còn 3 suất trong tuần này)</span>
            </a>
        `;
    });
</script>
</body>
</html>
