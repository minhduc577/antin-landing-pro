<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Sales AI & Báo Giá Tự Động - An Tín</title>
    <!-- Thư viện SheetJS xuất file Excel phiếu bán hàng -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- Thư viện EmailJS để gửi mail ngầm tự động -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("ZCs9sblTl_mKM5nQX");
        })();
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .container { width: 100%; max-width: 560px; background: #ffffff; border-radius: 20px; box-shadow: 0 10px 35px rgba(0,0,0,0.08); overflow: hidden; padding: 20px; display: flex; flex-direction: column; gap: 14px; }

        .header-title { text-align: center; }
        .header-title h2 { font-size: 18px; color: #1a73e8; font-weight: 800; }
        .header-title p { font-size: 12px; color: #5f6368; margin-top: 2px; }

        .matrix-box { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 10px; max-height: 420px; overflow-y: auto; }
        
        .matrix-item { display: flex; flex-direction: column; gap: 8px; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #ced4da; }
        .matrix-row-top { display: flex; justify-content: space-between; align-items: center; }
        .matrix-info { text-align: left; flex: 1; }
        .matrix-name { font-size: 12px; font-weight: 700; color: #202124; }
        .matrix-price { font-size: 11px; color: #1a73e8; font-weight: 600; }
        .matrix-qty { width: 60px; padding: 5px; text-align: center; border: 1px solid #ced4da; border-radius: 6px; font-size: 12px; font-weight: 700; }

        /* Tùy chọn mở rộng cho Combo Camera Hệ Thống */
        .combo-options { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 4px; padding-top: 6px; border-top: 1px dashed #e9ecef; font-size: 11px; align-items: center; }
        .combo-options select { padding: 4px 6px; border-radius: 6px; border: 1px solid #ced4da; font-size: 11px; background: #fff; font-weight: 600; color: #174ea6; }
        .cam-qty-group { display: flex; align-items: center; gap: 4px; }
        .cam-qty-group input { width: 45px; padding: 3px; text-align: center; border: 1px solid #ced4da; border-radius: 4px; font-size: 11px; font-weight: 700; }

        /* Khung tổng tiền & tài chính chi tiết */
        .summary-box { background: #e8f0fe; border: 1px solid #b4d2ff; padding: 12px; border-radius: 10px; display: flex; flex-direction: column; gap: 6px; font-size: 13px; color: #174ea6; font-weight: 600; }
        .summary-row { display: flex; justify-content: space-between; align-items: center; }
        .grand-total-row { font-size: 16px; font-weight: 800; border-top: 1px dashed #b4d2ff; padding-top: 6px; color: #d93025; }

        .btn-complete { width: 100%; background: linear-gradient(135deg, #28a745, #1e7e34); color: white; border: none; border-radius: 12px; padding: 14px; font-size: 14px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 15px rgba(40, 167, 69, 0.35); transition: 0.2s; text-align: center; }
        .btn-complete:hover { opacity: 0.95; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">
        <h2>🤖 MATRIX SALES AI - CẤU HÌNH BÁO GIÁ</h2>
        <p>✨ Tùy chỉnh hệ thống đầu ghi, số lượng camera & ổ cứng theo thực tế</p>
    </div>

    <!-- Danh mục Matrix AI chọn số lượng & Tùy chọn Combo -->
    <div class="matrix-box" id="matrix-list">
        <!-- Render tự động qua JS -->
    </div>

    <!-- Bảng tổng kết tài chính & Thuế VAT 8% -->
    <div class="summary-box">
        <div class="summary-row">
            <span>📦 Tổng tiền thiết bị:</span>
            <span id="sub-total">0 đ</span>
        </div>
        <div class="summary-row">
            <span>🛠️ Vật tư phụ & Nhân công lắp đặt:</span>
            <span id="labor-total" style="font-style: italic; color: #5f6368; font-size: 11px;">(Tính theo thực tế khảo sát)</span>
        </div>
        <div class="summary-row">
            <span>📊 Thuế VAT (8%):</span>
            <span id="vat-total">0 đ</span>
        </div>
        <div class="summary-row grand-total-row">
            <span>💰 TỔNG THANH TOÁN (DỰ TOÁN):</span>
            <span id="grand-total">0 đ</span>
        </div>
    </div>

    <!-- Nút hoàn thành -->
    <button id="btnXacNhan" class="btn-complete" onclick="processOrderAndSendEmail()">
        🚀 Xác Nhận Hoàn Thành & Xuất Phiếu Bán Hàng ➔
    </button>
</div>

<script>
    // Danh mục sản phẩm: Đầu ghi 1 bộ + Số lượng camera tùy chọn + Ổ cứng tùy chọn
    const products = [
        { id: 'wifi_cam', name: '📹 Camera Wi-Fi không dây độc lập (P2P/Xoay 360)', price: 1200000, isCombo: false },
        { 
            id: 'system_cam_6', name: '🎥 Hệ thống Combo Đầu ghi 6 Kênh (01 Đầu ghi)', basePrice: 2000000, camUnitPrice: 900000, isCombo: true,
            hddOptions: [
                { name: 'Ổ cứng 500GB', addPrice: 0 },
                { name: 'Ổ cứng 1TB', addPrice: 300000 },
                { name: 'Ổ cứng 3TB', addPrice: 1200000 },
                { name: 'Ổ cứng 6TB', addPrice: 3500000 },
                { name: 'Ổ cứng 8TB', addPrice: 5000000 },
                { name: '>8TB (Gọi An Tín báo giá)', addPrice: 0 }
            ]
        },
        { 
            id: 'system_cam_10', name: '🎥 Hệ thống Combo Đầu ghi 10 Kênh (01 Đầu ghi)', basePrice: 3200000, camUnitPrice: 900000, isCombo: true,
            hddOptions: [
                { name: 'Ổ cứng 500GB', addPrice: 0 },
                { name: 'Ổ cứng 1TB', addPrice: 300000 },
                { name: 'Ổ cứng 3TB', addPrice: 1200000 },
                { name: 'Ổ cứng 6TB', addPrice: 3500000 },
                { name: 'Ổ cứng 8TB', addPrice: 5000000 },
                { name: '>8TB (Gọi An Tín báo giá)', addPrice: 0 }
            ]
        },
        { 
            id: 'system_cam_18', name: '🎥 Hệ thống Combo Đầu ghi 18 Kênh (01 Đầu ghi)', basePrice: 5500000, camUnitPrice: 900000, isCombo: true,
            hddOptions: [
                { name: 'Ổ cứng 500GB', addPrice: 0 },
                { name: 'Ổ cứng 1TB', addPrice: 300000 },
                { name: 'Ổ cứng 3TB', addPrice: 1200000 },
                { name: 'Ổ cứng 6TB', addPrice: 3500000 },
                { name: 'Ổ cứng 8TB', addPrice: 5000000 },
                { name: '>8TB (Gọi An Tín báo giá)', addPrice: 0 }
            ]
        },
        { 
            id: 'system_cam_24', name: '🎥 Hệ thống Combo Đầu ghi 24 Kênh (01 Đầu ghi)', basePrice: 7500000, camUnitPrice: 900000, isCombo: true,
            hddOptions: [
                { name: 'Ổ cứng 500GB', addPrice: 0 },
                { name: 'Ổ cứng 1TB', addPrice: 300000 },
                { name: 'Ổ cứng 3TB', addPrice: 1200000 },
                { name: 'Ổ cứng 6TB', addPrice: 3500000 },
                { name: 'Ổ cứng 8TB', addPrice: 5000000 },
                { name: '>8TB (Gọi An Tín báo giá)', addPrice: 0 }
            ]
        },
        { 
            id: 'system_cam_32', name: '🎥 Hệ thống Combo Đầu ghi 32 Kênh (01 Đầu ghi)', basePrice: 9800000, camUnitPrice: 900000, isCombo: true,
            hddOptions: [
                { name: 'Ổ cứng 500GB', addPrice: 0 },
                { name: 'Ổ cứng 1TB', addPrice: 300000 },
                { name: 'Ổ cứng 3TB', addPrice: 1200000 },
                { name: 'Ổ cứng 6TB', addPrice: 3500000 },
                { name: 'Ổ cứng 8TB', addPrice: 5000000 },
                { name: '>8TB (Gọi An Tín báo giá)', addPrice: 0 }
            ]
        },
        { id: 'wifi_net', name: '🌐 Thiết bị Mạng Wi-Fi Mesh chuyên dụng & CNTT', price: 1500000, isCombo: false },
        { id: 'lock', name: '🔒 Khóa cửa điện tử thông minh / Chống đột nhập', price: 3500000, isCombo: false },
        { id: 'finger', name: '🖪 Máy chấm công vân tay & kiểm soát ra vào', price: 2800000, isCombo: false },
        { id: 'fire', name: '🔥 Hệ thống Báo cháy tự động thông minh', price: 2500000, isCombo: false },
        { id: 'smarthome', name: '🏠 Thiết bị Smart Home cơ bản (Điều khiển từ xa)', price: 4000000, isCombo: false },
        { id: 'electric', name: '⚡ Vật tư Điện dân dụng & Phụ kiện nguồn', price: 800000, isCombo: false }
    ];

    const matrixListEl = document.getElementById('matrix-list');
    function renderMatrix() {
        matrixListEl.innerHTML = '';
        products.forEach((p) => {
            let extraHtml = '';
            let rightInputHtml = '';

            if (p.isCombo) {
                let optionsHtml = '';
                p.hddOptions.forEach((opt, idx) => {
                    optionsHtml += `<option value="${idx}">${opt.name} (${opt.addPrice > 0 ? '+' + opt.addPrice.toLocaleString('vi-VN') + 'đ' : 'Cơ bản'})</option>`;
                });
                extraHtml = `
                    <div class="combo-options">
                        <div class="cam-qty-group">
                            <span>📷 Số lượng Cam:</span>
                            <input type="number" min="0" value="${p.id === 'system_cam_6' ? 4 : 0}" id="cam_qty_${p.id}" oninput="calculateTotal()">
                        </div>
                        <div>
                            <span>💾 Ổ cứng:</span>
                            <select id="hdd_${p.id}" onchange="calculateTotal()">${optionsHtml}</select>
                        </div>
                    </div>
                `;
                rightInputHtml = `<input type="number" min="0" value="${p.id === 'system_cam_6' ? 1 : 0}" class="matrix-qty" data-id="${p.id}" title="Số lượng Đầu ghi" oninput="calculateTotal()">`;
            } else {
                rightInputHtml = `<input type="number" min="0" value="${p.id === 'wifi_cam' ? 2 : 0}" class="matrix-qty" data-id="${p.id}" oninput="calculateTotal()">`;
            }

            matrixListEl.innerHTML += `
                <div class="matrix-item">
                    <div class="matrix-row-top">
                        <div class="matrix-info">
                            <div class="matrix-name">${p.name}</div>
                            <div class="matrix-price">${p.isCombo ? 'Đầu ghi cơ bản: ' + p.basePrice.toLocaleString('vi-VN') + 'đ | Cam: ' + p.camUnitPrice.toLocaleString('vi-VN') + 'đ/cái' : p.price.toLocaleString('vi-VN') + ' đ'}</div>
                        </div>
                        ${rightInputHtml}
                    </div>
                    ${extraHtml}
                </div>
            `;
        });
        calculateTotal();
    }

    function calculateTotal() {
        let subTotal = 0;

        document.querySelectorAll('.matrix-qty').forEach(input => {
            const qty = parseInt(input.value) || 0;
            const pId = input.getAttribute('data-id');
            const product = products.find(item => item.id === pId);
            
            if (product && qty > 0) {
                if (product.isCombo) {
                    const camQtyInput = document.getElementById(`cam_qty_${pId}`);
                    const camQty = camQtyInput ? (parseInt(camQtyInput.value) || 0) : 0;
                    
                    const selectEl = document.getElementById(`hdd_${pId}`);
                    let hddAddPrice = 0;
                    if (selectEl) {
                        const selectedIdx = parseInt(selectEl.value);
                        hddAddPrice = product.hddOptions[selectedIdx].addPrice;
                    }

                    // Công thức Combo: (Số lượng đầu ghi * Giá đầu ghi) + (Số lượng camera * Giá camera) + Giá ổ cứng tùy chọn
                    const comboTotal = (qty * product.basePrice) + (camQty * product.camUnitPrice) + hddAddPrice;
                    subTotal += comboTotal;
                } else {
                    subTotal += qty * product.price;
                }
            }
        });

        const laborAndMaterialsCost = 0; // Tính theo thực tế khảo sát
        const rawSum = subTotal + laborAndMaterialsCost;
        const vatAmount = rawSum * 0.08;
        const grandTotal = rawSum + vatAmount;

        // Cập nhật giao diện
        document.getElementById('sub-total').innerText = subTotal.toLocaleString('vi-VN') + ' đ';
        document.getElementById('vat-total').innerText = vatAmount.toLocaleString('vi-VN') + ' đ';
        document.getElementById('grand-total').innerText = grandTotal.toLocaleString('vi-VN') + ' đ';
    }

    renderMatrix();

    function processOrderAndSendEmail() {
        const cName = sessionStorage.getItem('ai_name') || 'Khách vãng lai';
        const cPhone = sessionStorage.getItem('ai_phone') || 'Chưa cung cấp';
        const cEmail = sessionStorage.getItem('ai_email') || 'Chưa cung cấp';
        const cNeed = sessionStorage.getItem('ai_need') || 'Không có ghi chú';
        const timeNow = new Date().toLocaleString('vi-VN');

        let orderDetails = [];
        let subTotalValue = 0;

        document.querySelectorAll('.matrix-qty').forEach(input => {
            const qty = parseInt(input.value) || 0;
            if (qty > 0) {
                const pId = input.getAttribute('data-id');
                const product = products.find(item => item.id === pId);
                if (product) {
                    if (product.isCombo) {
                        const camQtyInput = document.getElementById(`cam_qty_${pId}`);
                        const camQty = camQtyInput ? (parseInt(camQtyInput.value) || 0) : 0;
                        
                        const selectEl = document.getElementById(`hdd_${pId}`);
                        let hddName = "";
                        let hddAddPrice = 0;
                        if (selectEl) {
                            const selectedIdx = parseInt(selectEl.value);
                            hddName = product.hddOptions[selectedIdx].name;
                            hddAddPrice = product.hddOptions[selectedIdx].addPrice;
                        }

                        const lineTotal = (qty * product.basePrice) + (camQty * product.camUnitPrice) + hddAddPrice;
                        subTotalValue += lineTotal;

                        orderDetails.push({ 
                            name: `${product.name} (Đầu ghi: ${qty} cái, Camera: ${camQty} cái, ${hddName})`, 
                            price: lineTotal, 
                            qty: 1, 
                            total: lineTotal 
                        });
                    } else {
                        const lineTotal = qty * product.price;
                        subTotalValue += lineTotal;
                        orderDetails.push({ name: product.name, price: product.price, qty: qty, total: lineTotal });
                    }
                }
            }
        });

        if (orderDetails.length === 0) {
            alert('⚠️ Vui lòng chọn ít nhất một hệ thống combo hoặc thiết bị!');
            return;
        }

        const rawSum = subTotalValue;
        const vatValue = rawSum * 0.08;
        const finalGrandTotal = rawSum + vatValue;

        const btn = document.getElementById('btnXacNhan');
        btn.innerText = "⏳ Đang lập phiếu Excel & Gửi báo cáo...";
        btn.disabled = true;

        // 1. TẠO VÀ TẢI FILE EXCEL VỀ MÁY
        let excelRows = [
            ["PHIẾU BÁN HÀNG & KHẢO SÁT GIẢI PHÁP - AN TÍN"],
            ["Thời gian lập phiếu:", timeNow],
            [],
            ["THÔNG TIN KHÁCH HÀNG"],
            ["Họ và tên:", cName],
            ["Số điện thoại:", cPhone],
            ["Email:", cEmail],
            ["Nhu cầu ban đầu:", cNeed],
            [],
            ["CHI TIẾT CẤU HÌNH COMBO HỆ THỐNG & THIẾT BỊ (MATRIX AI)"],
            ["Tên thiết bị / Combo Hệ thống", "Đơn giá / Thành tiền (VNĐ)", "Số lượng", "Thành tiền (VNĐ)"]
        ];

        orderDetails.forEach(item => excelRows.push([item.name, item.price, item.qty, item.total]));
        excelRows.push(["Vật tư phụ & Nhân công lắp đặt", "Tính theo thực tế khảo sát", "", 0]);
        excelRows.push([]);
        excelRows.push(["CỘNG TIỀN HÀNG:", "", "", subTotalValue]);
        excelRows.push(["THUẾ VAT (8%):", "", "", vatValue]);
        excelRows.push(["TỔNG THANH TOÁN (DỰ TOÁN):", "", "", finalGrandTotal]);

        const ws = XLSX.utils.aoa_to_sheet(excelRows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "PhieuBanHang_AnTin");
        XLSX.writeFile(wb, `PhieuBanHang_${cName.replace(/\s+/g, '_')}.xlsx`);

        // 2. TẠO BẢNG HTML GỬI VỀ EMAILJS
        let htmlTableRows = '';
        orderDetails.forEach(item => {
            htmlTableRows += `
                <tr>
                    <td style="padding: 8px; border: 1px solid #ddd;">${item.name}</td>
                    <td style="padding: 8px; border: 1px solid #ddd; text-align: right; font-weight: bold;">${item.total.toLocaleString('vi-VN')} đ</td>
                </tr>
            `;
        });

        const htmlMessage = `
            <div style="font-family: Arial, sans-serif; color: #333; max-width: 650px;">
                <h3 style="color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 8px;">🚀 CÓ ĐƠN HÀNG / YÊU CẦU KHẢO SÁT MỚI</h3>
                <p><strong>🕒 Thời gian:</strong> ${timeNow}</p>
                
                <div style="background: #f8f9fa; padding: 12px; border-radius: 8px; margin: 15px 0;">
                    <h4 style="margin-bottom: 8px; color: #202124;">👤 Thông tin khách hàng:</h4>
                    <p>• Họ và tên: <strong>${cName}</strong></p>
                    <p>• Số điện thoại: <strong>${cPhone}</strong></p>
                    <p>• Email: <strong>${cEmail}</strong></p>
                    <p>• Nhu cầu thực tế: <em>${cNeed}</em></p>
                </div>

                <h4 style="margin-bottom: 8px; color: #202124;">📋 Bảng chi tiết cấu hình (Copy bảng này paste thẳng vào Excel):</h4>
                <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
                    <thead>
                        <tr style="background: #1a73e8; color: white;">
                            <th style="padding: 8px; border: 1px solid #1a73e8; text-align: left;">Tên thiết bị / Combo Hệ thống</th>
                            <th style="padding: 8px; border: 1px solid #1a73e8; text-align: right;">Thành tiền</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${htmlTableRows}
                        <tr>
                            <td style="padding: 8px; border: 1px solid #ddd;">Vật tư phụ & Nhân công lắp đặt</td>
                            <td style="padding: 8px; border: 1px solid #ddd; text-align: right; font-style: italic; color: #5f6368;">Tính theo thực tế khảo sát</td>
                        </tr>
                    </tbody>
                </table>

                <div style="margin-top: 15px; background: #e8f0fe; padding: 12px; border-radius: 8px; text-align: right;">
                    <p style="margin: 4px 0;">Cộng tiền hàng: <strong>${subTotalValue.toLocaleString('vi-VN')} đ</strong></p>
                    <p style="margin: 4px 0;">Thuế VAT (8%): <strong>${vatValue.toLocaleString('vi-VN')} đ</strong></p>
                    <p style="margin: 8px 0 0 0; font-size: 16px; color: #d93025;">TỔNG THANH TOÁN (DỰ TOÁN): <strong>${finalGrandTotal.toLocaleString('vi-VN')} đ</strong></p>
                </div>
                <p style="margin-top: 20px; font-size: 12px; color: #5f6368;">⚡ Hệ thống Sales AI Automation - An Tín</p>
            </div>
        `;

        const templateParams = {
            to_email: "ctyantinco@gmail.com",
            message: htmlMessage,
            customer_name: cName,
            customer_phone: cPhone,
            customer_email: cEmail
        };

        if (typeof emailjs !== 'undefined') {
            emailjs.send("service_vj9uc6d", "template_mtqvd5q", templateParams)
                .then(function(res) {
                    console.log("Gửi mail thành công!");
                    btn.innerText = "✅ Đã Xuất Phiếu & Gửi Mail Thành Công!";
                    setTimeout(() => {
                        btn.innerText = "🚀 Xác Nhận Hoàn Thành & Xuất Phiếu Bán Hàng ➔";
                        btn.disabled = false;
                    }, 3000);
                }, function(err) {
                    console.log("Lỗi gửi mail:", err);
                    alert("⚠️ Có lỗi khi gửi email, nhưng file Excel đã được tải về máy của bạn!");
                    btn.innerText = "🚀 Xác Nhận Hoàn Thành & Xuất Phiếu Bán Hàng ➔";
                    btn.disabled = false;
                });
        }
    }
</script>

</body>
</html>
