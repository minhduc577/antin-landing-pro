<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cảm ơn quý khách - AN TÍN TECHNOLOGY</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px 20px; background-color: #f4f7f6; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #d32f2f; }
        p { color: #333; line-height: 1.6; }
        .btn-zalo { display: inline-block; background-color: #0084FF; color: white; padding: 15px 30px; text-decoration: none; border-radius: 10px; font-weight: bold; margin-top: 20px; }
        .btn-home { display: block; margin-top: 20px; color: #666; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cảm ơn anh!</h1>
        <p>Thông tin của anh đã được gửi tới hệ thống <b>AN TÍN TECHNOLOGY</b>.</p>
        <p>Chuyên viên của chúng tôi sẽ liên hệ tư vấn chi tiết cho anh trong vòng 15 phút tới.</p>
        
        <a href="https://zalo.me/0914060339" class="btn-zalo" target="_blank">NHẮN ZALO HỖ TRỢ NGAY</a>
        
        <a href="index.html" class="btn-home">Quay lại trang chủ</a>
    </div>

    <script>
        // Hàm gửi dữ liệu về Google Sheets
        function sendLeadToSheet() {
            // Lấy dữ liệu từ localStorage (giả sử anh đã lưu các key này ở trang trước)
            const leadData = {
                name: localStorage.getItem('user_name') || 'Khách hàng',
                phone: localStorage.getItem('user_phone') || 'Chưa cung cấp',
                space: localStorage.getItem('loai_hinh') || 'Không xác định',
                price: localStorage.getItem('last_price') || 'Liên hệ',
                timestamp: new Date().toLocaleString('vi-VN')
            };

            const WEB_APP_URL = "DÁN_URL_CỦA_ANH_VÀO_ĐÂY";

            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(leadData)
            })
            .then(() => console.log("Dữ liệu đã được ghi nhận về An Tín!"))
            .catch(err => console.error("Lỗi kết nối:", err));
        }

        // Tự động chạy khi trang Cảm ơn tải xong
        window.onload = sendLeadToSheet;
    </script>
</body>
</html>
